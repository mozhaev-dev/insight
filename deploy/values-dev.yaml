##
## Insight umbrella — dev / eval overlay.
##
## With `credentials.autoGenerate: true` (the default) the umbrella
## generates all DB passwords at install time and stores them in
## `insight-db-creds`. No static credentials are needed in this overlay.
##
## `dev-up.sh` applies it automatically via INSIGHT_VALUES_FILES.
##
## Image tags are deliberately empty in the chart's values.yaml — the
## chart no longer ships defaults. dev-up.sh fills the tags from
## locally-built images (`kind load`) via additional --set arguments.
##

# ─── Logical defaults for dev ──────────────────────────────────────────
# These are chart conventions, not credentials. Setting them here keeps
# `helm template` short for dev — production overlays must override.
clickhouse:
  database: "insight"
  username: "insight"
  image:
    tag: "25.3"

mariadb:
  database: "insight"
  username: "insight"
  # bitnami/mariadb creates user + database from auth.{username,database}
  # at first pod boot. They MUST match the top-level values above (the
  # umbrella validator enforces this). See charts/insight/values.yaml
  # for the rationale.
  auth:
    username: "insight"
    database: "insight"

# Single-replica app services for dev — the canonical chart uses 2
# replicas per service for production HA / zero-downtime rolling updates,
# which is wasteful on a single-node Kind cluster.
apiGateway:
  replicaCount: 1
analyticsApi:
  replicaCount: 1

# Identity (.NET 9) — persons-store API. Enabled in dev so the route
# added under apiGateway.proxy.routes has a live upstream.
identity:
  deploy: true
