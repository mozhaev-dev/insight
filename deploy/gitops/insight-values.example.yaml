##
## Insight umbrella вЂ” EXAMPLE GitOps overlay.
##
## This file is renamed `*.example.yaml` deliberately so a careless
## clone-and-apply does NOT pick up these values. Copy it to
## `insight-values.yaml`, replace every `*.example.com` host and the
## OIDC client_id with your real values, and reference the copy from
## `deploy/gitops/insight-application.yaml` (`valueFiles:` entry).
##
## в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
##  GitOps + auto-generated credentials вЂ” IMPORTANT
## в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
## The umbrella's `credentials.autoGenerate: true` (chart default) uses
## Helm's `lookup` function to keep `insight-db-creds` stable across
## upgrades. ArgoCD renders charts via `helm template`, where `lookup`
## ALWAYS returns nil вЂ” so under a GitOps reconcile loop every sync
## would regenerate `randAlphaNum 24` and overwrite the Secret, rotating
## passwords on every Argo sync and breaking every DB client.
##
## Therefore THIS overlay disables auto-gen. The operator MUST pre-create
## `insight-db-creds` in the release namespace before the first ArgoCD
## sync, with all four required keys:
##   - clickhouse-password
##   - mariadb-password
##   - mariadb-root-password
##   - redis-password
##
## Use the Secret-management tool of your choice вЂ” ExternalSecrets
## Operator + Vault, sealed-secrets, SOPS вЂ” to keep the values out of
## Git. The umbrella's BYO validator refuses to install when any
## required key is missing, empty, or contains URL-reserved characters
## (`@ : / ? # %`) that would silently corrupt DSNs.
##
credentials:
  # GitOps mode вЂ” the validator refuses `gitops + autoGenerate=true`
  # because `helm template` (the rendering path ArgoCD uses) gets nil
  # from `lookup`, so auto-gen would rotate every DB password on each
  # reconcile. Pre-create `insight-db-creds` out-of-band вЂ” see the
  # comment block at the top of this file.
  deploymentMode: gitops
  autoGenerate: false

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Infrastructure sizing for production
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
clickhouse:
  username: insight              # convention; change if needed
  database: insight
  image:
    tag: "25.3"                  # pin to a tested version; never `latest`
  persistence:
    size: 20Gi
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: "4",  memory: 8Gi }

mariadb:
  username: insight
  database: insight
  primary:
    persistence:
      size: 10Gi

# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Image tags вЂ” pin every service to the appVersion of the umbrella
# release you are deploying. The chart `required`s these (no
# `:latest` defaults) so a missing entry fails fast.
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
apiGateway:
  image:
    tag: "0.1.0"                 # CHANGE on every release
  authDisabled: false

  # OIDC via a pre-created Secret (do NOT inline secrets in Git).
  # Create `insight-oidc` in the insight namespace with keys:
  #   issuer, audience, clientId, redirectUri
  # Use ExternalSecrets / sealed-secrets / SOPS of your choice.
  oidc:
    existingSecret: insight-oidc

  ingress:
    enabled: true
    className: nginx
    host: insight.example.com    # в†ђ REPLACE with your real DNS
    tls:
      enabled: true
      secretName: insight-tls

analyticsApi:
  image:
    tag: "0.1.0"                 # CHANGE on every release

frontend:
  image:
    tag: "0.1.0"                 # CHANGE on every release
  oidc:
    clientId: insight-frontend   # MUST match apiGateway.oidc.clientId
  ingress:
    enabled: true
    className: nginx
    host: app.insight.example.com  # в†ђ REPLACE with your real DNS
