{{/*
==============================================================================
 Per-service ClickHouse database provisioning
==============================================================================

Helm Hook Job that provisions each database listed in
`clickhouse.initDatabases` against whatever `clickhouse.host` resolves
to. Works in both modes from a single source of truth:

- Bundled (`clickhouse.deploy=true`):  in-namespace CH StatefulSet
                                       (`{release}-clickhouse`); this
                                       Job waits for `/ping` to succeed
                                       (which means the bundled CH has
                                       finished bootstrapping
                                       `CLICKHOUSE_USER` + the
                                       privileged service user), then
                                       runs the DDL.
- External (`clickhouse.deploy=false`): CH is hosted out-of-chart
                                       (gitops L2, Constructor Platform,
                                       managed warehouse, …); this Job
                                       dials `clickhouse.host` directly.

ClickHouse auth model: the service user (`clickhouse.username`, default
`insight`) is the bootstrap user — there is no separate root in this
chart's contract. Bundled installs run with
`CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1` so the service user has full
admin (incl. CREATE DATABASE). External installs MUST grant the
service user CREATE DATABASE — that's the operator-side contract.

Hook timing: `pre-install,pre-upgrade`. Mirrors the MariaDB Hook —
the DB must exist BEFORE application pods that read it (analytics-api,
ingestion workflows) start, otherwise helm `--wait` blocks on their
CrashLoopBackOff'd pods until timeout and never reaches post-*
hooks.

Prerequisite: `insight-db-creds` must exist in the namespace BEFORE
helm install/upgrade runs (gitops mode applies it first, upgrades
inherit it from prior install). Fresh autoGenerate-mode installs on
a brand-new namespace need the Secret template itself converted to a
hook — tracked separately.

Idempotent. `CREATE DATABASE IF NOT EXISTS` is a no-op on second-and-
later runs. Connector-specific bronze databases beyond the configured
`initDatabases` list are created lazily by the ingestion pipelines
themselves — this Job owns only the chart-declared list.

Replaces the bundled-only ConfigMap path that was in the CH subchart
(`helmfile/charts/clickhouse/templates/init-configmap.yaml`), which
only ran during the CH container's docker-entrypoint-initdb.d phase
and therefore did nothing for external/layered installs.
==============================================================================
*/}}
{{- if .Values.clickhouse.initDatabases }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "insight.fullname" . }}-clickhouse-init-svcdbs
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    {{- include "insight.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse-init
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "insight.fullname" . }}-clickhouse-init
        app.kubernetes.io/component: clickhouse-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: curlimages/curl:8.10.1
          imagePullPolicy: IfNotPresent
          env:
            - name: CH_HOST
              value: {{ include "insight.clickhouse.host" . | quote }}
            - name: CH_PORT
              value: {{ include "insight.clickhouse.port" . | quote }}
            - name: CH_USER
              value: {{ required "clickhouse.username is required" .Values.clickhouse.username | quote }}
            - name: CH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default "insight-db-creds" .Values.clickhouse.passwordSecret.name | quote }}
                  key:  {{ default "clickhouse-password" .Values.clickhouse.passwordSecret.key | quote }}
          command:
            - sh
            - -ec
            - |
              echo "Waiting for ClickHouse at ${CH_HOST}:${CH_PORT}..."
              for i in $(seq 1 60); do
                if curl -sS -o /dev/null --fail "http://${CH_HOST}:${CH_PORT}/ping" 2>/dev/null; then
                  echo "ClickHouse reachable after $i attempt(s)."
                  break
                fi
                if [ "$i" = "60" ]; then
                  echo "ERROR: ClickHouse did not become reachable within 2 minutes" >&2
                  exit 1
                fi
                sleep 2
              done

              echo "Provisioning per-service databases..."
              {{- range .Values.clickhouse.initDatabases }}
              curl -sS --fail-with-body \
                -u "${CH_USER}:${CH_PASSWORD}" \
                "http://${CH_HOST}:${CH_PORT}/" \
                --data-urlencode 'query=CREATE DATABASE IF NOT EXISTS `{{ . }}`'
              echo "Provisioned {{ . }}."
              {{- end }}
              echo "Done."
{{- end }}
