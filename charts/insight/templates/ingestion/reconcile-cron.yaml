{{- if .Values.ingestion.templates.enabled }}
{{- /* Argo CronWorkflow that drives the connector reconcile loop on schedule. */}}
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ include "insight.fullname" . }}-reconcile-loop
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: reconcile-loop
    {{- include "insight.labels" . | nindent 4 }}
spec:
  schedule: {{ required "ingestion.reconcile.schedule is required" .Values.ingestion.reconcile.schedule | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  # Bound history at the CronWorkflow level so the per-tick Workflows
  # don't accumulate forever in etcd (per cpt-insightspec-fr-leak-free-loop;
  # 96 ticks/day at the */15 default would otherwise pile up).
  successfulJobsHistoryLimit: {{ default 3 .Values.ingestion.reconcile.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit:     {{ default 3 .Values.ingestion.reconcile.failedJobsHistoryLimit }}
  workflowSpec:
    serviceAccountName: {{ include "insight.fullname" . }}-reconcile
    entrypoint: run
    activeDeadlineSeconds: 1800
    # Garbage-collect both Workflow CRs and their pods after completion.
    # Without ttlStrategy + podGC, completed Workflows linger in etcd and
    # the pods stay Completed in the namespace, defeating the leak-free
    # loop guarantee in PRD §5.6.
    ttlStrategy:
      secondsAfterCompletion: {{ default 1800 .Values.ingestion.reconcile.ttlSecondsAfterCompletion }}
      secondsAfterSuccess:    {{ default 600  .Values.ingestion.reconcile.ttlSecondsAfterSuccess }}
      secondsAfterFailure:    {{ default 3600 .Values.ingestion.reconcile.ttlSecondsAfterFailure }}
    podGC:
      strategy: OnPodCompletion
    {{- with .Values.global.imagePullSecrets }}
    imagePullSecrets:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    volumes:
      - name: insight-reconcile-logs
        {{- if .Values.ingestion.reconcile.logs.persistent }}
        persistentVolumeClaim:
          claimName: {{ include "insight.fullname" . }}-reconcile-logs
        {{- else }}
        emptyDir: {}
        {{- end }}
    templates:
      - name: run
        container:
          image: {{ required "ingestion.toolboxImage is required when ingestion.templates.enabled=true" .Values.ingestion.toolboxImage | quote }}
          command: [bash]
          args:
            - "-c"
            - "bash /src/ingestion/reconcile-connectors/main.sh"
          env:
            - name: AIRBYTE_URL
              value: {{ include "insight.airbyte.url" . | quote }}
            - name: INSIGHT_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            # Airbyte workspace UUID is auto-discovered at runtime via ab_workspace_id (ADR-0009).
            # Bronze destination is auto-resolved-or-created by reconcile from
            # the Clickhouse connection details below (ADR-0012). The legacy
            # destinationId override is honoured if set on the env.
            {{- with .Values.ingestion.reconcile.destinationId }}
            - name: RECONCILE_DESTINATION_ID
              value: {{ . | quote }}
            {{- end }}
            - name: RECONCILE_DESTINATION_NAME
              value: {{ default "clickhouse-bronze" .Values.ingestion.reconcile.destinationName | quote }}
            - name: RECONCILE_DEST_CLICKHOUSE_HOST
              value: {{ include "insight.clickhouse.fqdn" . | quote }}
            - name: RECONCILE_DEST_CLICKHOUSE_PORT
              value: {{ include "insight.clickhouse.port" . | quote }}
            - name: RECONCILE_DEST_CLICKHOUSE_DATABASE
              value: {{ include "insight.clickhouse.database" . | quote }}
            - name: RECONCILE_DEST_CLICKHOUSE_USERNAME
              value: {{ required "clickhouse.username is required" .Values.clickhouse.username | quote }}
            - name: RECONCILE_DEST_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "clickhouse.passwordSecret.name is required" .Values.clickhouse.passwordSecret.name | quote }}
                  key:  {{ required "clickhouse.passwordSecret.key is required"  .Values.clickhouse.passwordSecret.key  | quote }}
            - name: INSIGHT_TENANT_ID
              value: {{ required "ingestion.reconcile.tenantId is required (the Insight tenant slug; used in source/connection names per ADR-0005)" .Values.ingestion.reconcile.tenantId | quote }}
            # ARGO_INSTANCE_ID — set only when the cluster's Argo workflow
            # controller runs with `instanceID:` configured. Empty value
            # leaves the controller-instanceid label off the rendered
            # workflows; controllers without instanceID accept them.
            - name: ARGO_INSTANCE_ID
              value: {{ default "" .Values.ingestion.reconcile.argoInstanceId | quote }}
            - name: ARGO_SERVICE_ACCOUNT
              value: {{ printf "%s-reconcile" (include "insight.fullname" .) | quote }}
          resources:
            requests:
              cpu: {{ required "ingestion.reconcile.resources.requests.cpu is required" .Values.ingestion.reconcile.resources.requests.cpu | quote }}
              memory: {{ required "ingestion.reconcile.resources.requests.memory is required" .Values.ingestion.reconcile.resources.requests.memory | quote }}
            limits:
              cpu: {{ required "ingestion.reconcile.resources.limits.cpu is required" .Values.ingestion.reconcile.resources.limits.cpu | quote }}
              memory: {{ required "ingestion.reconcile.resources.limits.memory is required" .Values.ingestion.reconcile.resources.limits.memory | quote }}
          volumeMounts:
            - name: insight-reconcile-logs
              mountPath: /var/log/insight
{{- end }}
