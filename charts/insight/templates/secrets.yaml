{{/*
==============================================================================
 Auto-generated credentials
==============================================================================
The umbrella provisions two (or three) Secrets per install:

  1. `insight-db-creds` — raw passwords consumed by the bundled infra
     charts (mariadb, redis, clickhouse). Keys match the field names
     those charts expect natively (or that we configure them to use).

  2. `insight-analytics-api-config` — pre-assembled env vars for the
     analytics-api Rust service, including a full `ANALYTICS__database_url`
     that embeds the MariaDB password.

  3. `insight-identity-config` — identical pattern for the .NET identity
     service, emitted only when `identity.deploy=true`.

`lookup` on first line makes this idempotent: on subsequent `helm upgrade`
runs we REUSE the existing Secret values, so pod restarts do not
invalidate credentials. Fresh install (no existing Secret) →
randAlphaNum 24 per field.

FIXED SECRET NAMES (no release-name prefix). One Insight install per
namespace — multi-tenant uses multiple namespaces, each with its own
`insight-db-creds`. This keeps values.yaml `passwordSecret.name`
references constant and matches the SRE single-namespace model.

Constructor Platform / BYO path: the customer creates `insight-db-creds`
with their own values BEFORE the first `helm install`. The chart auto-
detects BYO via absence of the `app.kubernetes.io/managed-by=Helm` label
and SKIPS emitting its own Secret template — Helm therefore never tries
to take ownership of the customer's Secret and the install no longer
fails with `invalid ownership metadata`. The chart still uses `lookup`
to read the BYO values for composing the per-service config Secrets
(`insight-analytics-api-config`, `insight-identity-config`).

If any of the four required keys is empty or missing on a BYO Secret,
the install FAILS FAST with a readable message instead of silently
writing an empty password.

To bypass auto-gen entirely (e.g. in an air-gapped env where lookup is
undesirable), set `credentials.autoGenerate: false` and pre-create the
Secret.
==============================================================================
*/}}

{{- if .Values.credentials.autoGenerate }}

{{- /* Attempt lookup; on first install this returns nil. Helm 3 skips
       lookups during `--dry-run` by default, so dry-runs see this as a
       fresh install (the chart emits its own Secret template). */ -}}
{{- $dbSec := lookup "v1" "Secret" .Release.Namespace "insight-db-creds" -}}

{{- /* Detect BYO: the customer pre-created `insight-db-creds` with
       their own values and (deliberately or not) without Helm ownership
       labels. Skipping our Secret template emission for that case is
       what makes the documented BYO path actually work — otherwise
       Helm refuses to install with `invalid ownership metadata`. */ -}}
{{- $byo := false -}}
{{- if $dbSec -}}
  {{- $managedBy := "" -}}
  {{- if and $dbSec.metadata $dbSec.metadata.labels -}}
    {{- $managedBy = index $dbSec.metadata.labels "app.kubernetes.io/managed-by" -}}
  {{- end -}}
  {{- if ne $managedBy "Helm" -}}
    {{- $byo = true -}}
  {{- end -}}
{{- end -}}

{{- /* Per-key resolve: reuse existing (and complain loudly on empty)
       or generate fresh on first install. */ -}}
{{- $resolve := dict -}}
{{- $keys := list "clickhouse-password" "mariadb-password" "mariadb-root-password" "redis-password" -}}
{{- range $k := $keys -}}
  {{- $val := "" -}}
  {{- if $dbSec -}}
    {{- /* Existing Secret (BYO or Helm-managed) → must have every required key filled. */ -}}
    {{- $raw := index $dbSec.data $k -}}
    {{- if not $raw -}}
      {{- fail (printf "insight-db-creds exists but is missing key %q. Fill every required key (clickhouse-password, mariadb-password, mariadb-root-password, redis-password) or delete the Secret to re-generate." $k) -}}
    {{- end -}}
    {{- $val = $raw | b64dec -}}
    {{- if not $val -}}
      {{- fail (printf "insight-db-creds.%s is empty — refusing to install with a blank password. Populate the key or delete the Secret to re-generate." $k) -}}
    {{- end -}}
  {{- else -}}
    {{- /* First install → generate. */ -}}
    {{- $val = randAlphaNum 24 -}}
  {{- end -}}
  {{- $_ := set $resolve $k $val -}}
{{- end -}}

{{- $chPass    := index $resolve "clickhouse-password" -}}
{{- $mdbPass   := index $resolve "mariadb-password" -}}
{{- $mdbRoot   := index $resolve "mariadb-root-password" -}}
{{- $redisPass := index $resolve "redis-password" -}}

{{- /* Compose Redis URL: bitnami/redis sets a password by default in the
       umbrella-managed install, but external Redis (deploy=false with
       a stock-config server) may have auth disabled. Emit a userless URL
       in that case so the analytics-api client doesn't send `AUTH`. */ -}}
{{- $redisHost := include "insight.redis.host" . -}}
{{- $redisPort := include "insight.redis.port" . -}}
{{- $redisUrl  := printf "redis://%s:%v" $redisHost $redisPort -}}
{{- if $redisPass -}}
  {{- $redisUrl = printf "redis://:%s@%s:%v" $redisPass $redisHost $redisPort -}}
{{- end -}}

{{- /* BYO path: the operator owns `insight-db-creds` out-of-band. We
       skip emitting our template entirely so Helm doesn't try to take
       ownership and fail with `invalid ownership metadata`. The values
       have already been read into $chPass/$mdbPass/etc. via lookup
       above, so the per-service config Secrets below still get the
       correct passwords interpolated. */ -}}
{{- if not $byo }}
---
apiVersion: v1
kind: Secret
metadata:
  name: insight-db-creds
  labels:
    {{- include "insight.labels" . | nindent 4 }}
  annotations:
    # Helm-managed, but preserved across uninstalls so the next install
    # picks up the same credentials (avoids accidental data loss when
    # bundled CH/MariaDB PVCs survive a helm uninstall).
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  clickhouse-password:   {{ $chPass    | quote }}
  mariadb-password:      {{ $mdbPass   | quote }}
  mariadb-root-password: {{ $mdbRoot   | quote }}
  redis-password:        {{ $redisPass | quote }}
{{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: insight-analytics-api-config
  labels:
    {{- include "insight.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Full DSN, password interpolated from generated credentials. No
  # silent defaults — `required` on every field that the operator MUST
  # supply (username, database). Passwords come from `insight-db-creds`.
  ANALYTICS__database_url: {{ printf "mysql://%s:%s@%s:%v/%s"
    (required "mariadb.username is required" .Values.mariadb.username)
    $mdbPass
    (include "insight.mariadb.host" .)
    (include "insight.mariadb.port" .)
    (include "insight.mariadb.database" .)
    | quote }}
  ANALYTICS__clickhouse_url:          {{ include "insight.clickhouse.url" . | quote }}
  ANALYTICS__clickhouse_database:     {{ include "insight.clickhouse.database" . | quote }}
  ANALYTICS__clickhouse_user:         {{ required "clickhouse.username is required" .Values.clickhouse.username | quote }}
  ANALYTICS__clickhouse_password:     {{ $chPass | quote }}
  ANALYTICS__identity_url:            {{ printf "http://%s:8082" (include "insight.identity.host" .) | quote }}
  ANALYTICS__redis_url:               {{ $redisUrl | quote }}
  ANALYTICS__bind_addr: "0.0.0.0:8081"

{{- if .Values.identity.deploy }}
---
apiVersion: v1
kind: Secret
metadata:
  name: insight-identity-config
  labels:
    {{- include "insight.labels" . | nindent 4 }}
type: Opaque
stringData:
  # The .NET identity service owns its own MariaDB database (per ADR-0006)
  # — separate from the analytics-api `insight` database — and applies its
  # own DbUp migrations against it at startup. The umbrella provisions the
  # empty database via the bitnami MariaDB subchart's
  # `primary.initdbScriptsConfigMap` (see templates/mariadb-initdb-scripts.yaml),
  # which runs on the first MariaDB pod boot and is restart-safe (data
  # lives in the PVC).
  #
  # `IDENTITY__mariadb__url` is the URL form. The service also accepts
  # `IDENTITY__mariadb__connection_string` (raw MySqlConnector KV form)
  # for callers that need MariaDB-specific options that the URL shape
  # cannot express — tests use that path, production uses URL form.
  # User/password are percent-encoded so BYO credentials containing
  # `:`, `@`, `/`, `%` etc. produce a valid DSN. Auto-generated
  # `randAlphaNum 24` happens to be safe today, but `lookup`-loaded
  # operator-supplied creds may not be.
  IDENTITY__mariadb__url: {{ printf "mysql://%s:%s@%s:%v/%s"
    (required "mariadb.username is required" .Values.mariadb.username | urlquery)
    ($mdbPass | urlquery)
    (include "insight.mariadb.host" .)
    (include "insight.mariadb.port" .)
    (required "identity.databaseName is required" .Values.identity.databaseName)
    | quote }}
  {{- with .Values.identity.tenantDefaultId }}
  IDENTITY__identity__tenant_default_id: {{ . | quote }}
  {{- end }}
{{- end }}

{{- end }}
