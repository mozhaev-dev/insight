##
## Identity Resolution (.NET 9) — local development overrides
##
## Base values: src/backend/services/identity/helm/values.yaml
##
## Config Secret: `insight-identity-config` carries
##   IDENTITY__mariadb__url
##   IDENTITY__identity__tenant_default_id (optional)
## Emitted by the umbrella chart when `identity.deploy=true`. For
## helmfile-only deploys the Secret must already exist in the namespace.
##

replicaCount: 1

existingSecret: insight-identity-config

resources:
  requests:
    cpu: 50m
    memory: 96Mi
  limits:
    cpu: 250m
    memory: 384Mi
