replicaCount: 1

podAnnotations: {}

image:
  repository: ghcr.io/cyberfabric/insight-front
  tag: ""                # MUST be set by the operator. No `:latest` default.
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: ""

oidc:
  issuer: ""
  clientId: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
