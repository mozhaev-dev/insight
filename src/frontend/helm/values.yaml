replicaCount: 1

podAnnotations: {}

image:
  repository: ghcr.io/cyberfabric/insight-front
  tag: ""                # MUST be set by the operator. No `:latest` default.
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: ""

oidc:
  issuer: ""
  clientId: ""
  # Space-separated OIDC scopes. IdP-specific:
  #   Entra v2 single-app: "openid profile email api://<clientId>/Access.Default"
  #   Okta:                "openid profile email <api-name>.<scope>"
  # REQUIRED when oidc.issuer and oidc.clientId are set; entrypoint refuses
  # to start otherwise.
  scopes: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
