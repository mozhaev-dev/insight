version: 2

sources:
  - name: bamboohr
    schema: bronze_bamboohr
    tables:
      - name: employees
      - name: leave_requests
      - name: meta_fields

models:
  - name: to_class_people
    description: >
      BambooHR Employees -> class_people (Silver Step 1).
      Full-refresh source. Identity key: email (workEmail).
      Maps BambooHR status to normalised status (active/on_leave/terminated).
      SCD Type 2 fields (valid_from/valid_to) are set as current-state snapshot
      (valid_from = lastChanged, valid_to = NULL).
    columns:
      - name: tenant_id
        description: "Tenant isolation identifier"
        tests:
          - not_null
      - name: source_id
        description: "Connector instance identifier"
        tests:
          - not_null
      - name: unique_key
        description: "Composite dedup key"
        tests:
          - not_null
      - name: source_person_id
        description: "BambooHR employee ID"
        tests:
          - not_null
      - name: email
        description: "Work email — identity key for Silver Step 2"
      - name: display_name
        description: "Full display name"
      - name: first_name
        description: "First name"
      - name: last_name
        description: "Last name"
      - name: status
        description: "Normalised: active, on_leave, terminated"
        tests:
          - accepted_values:
              arguments:
                values: ['active', 'on_leave', 'terminated']
      - name: source
        description: "Always 'bamboohr'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['bamboohr']
      - name: workspace_id
        description: "Tenant identifier"
        tests:
          - not_null

  - name: bamboohr__hr_events
    description: >
      BambooHR leave_requests → class_hr_events (Silver Step 2 staging).
      One row per leave request. Joins to employees to resolve email.
      type/amount/status are JSON objects in Bronze — extracted with JSONExtractString.
    columns:
      - name: insight_tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: source_person_id
        description: "BambooHR employeeId"
        tests:
          - not_null
      - name: email
        description: "Resolved from employees.workEmail via JOIN"
      - name: event_type
        description: "Always 'leave' for leave_requests"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['leave']
      - name: event_subtype
        description: "Leave type name (Annual Leave, Sick Leave, etc.) from type.name JSON"
      - name: start_date
        description: "Leave start date"
        tests:
          - not_null
      - name: end_date
        description: "Leave end date"
        tests:
          - not_null
      - name: duration_amount
        description: "Amount from amount.amount JSON (numeric)"
      - name: duration_unit
        description: "Unit from amount.unit JSON: hours or days"
      - name: request_status
        description: "Status from status.status JSON: approved, denied, requested"
      - name: source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['bamboohr']
      - name: created_at
        description: "When the leave request was created in BambooHR"
      - name: ingested_at
        tests:
          - not_null

  - name: bamboohr__working_hours
    description: >
      BambooHR active employees → class_hr_working_hours (Silver Step 2 staging).
      One row per active employee with their scheduled working hours.
      standardHoursPerWeek is not provided by this tenant; defaults to 8h/day / 40h/week.
    columns:
      - name: insight_tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: source_person_id
        description: "BambooHR employee ID"
        tests:
          - not_null
      - name: email
        description: "Work email — identity key"
        tests:
          - not_null
      - name: display_name
        tests:
          - not_null
      - name: employment_type
        description: "BambooHR employmentHistoryStatus (Contractor, Employee, etc.)"
      - name: source
        tests:
          - not_null
          - accepted_values:
              values: ['bamboohr']
      - name: working_hours_per_day
        description: "Scheduled working hours per working day"
        tests:
          - not_null
      - name: working_hours_per_week
        description: "Scheduled working hours per week"
        tests:
          - not_null
      - name: ingested_at
        tests:
          - not_null

  - name: bamboohr__employees_snapshot
    description: >
      SCD2 append-only snapshot of BambooHR employees.
      Tracks changes in standard fields and custom fields from raw_data.
      Custom fields list is passed via dbt var bamboohr_custom_fields.
    columns:
      - name: unique_key
        tests:
          - not_null
      - name: _row_hash
        description: "cityHash64 of tracked columns for change detection"
      - name: _tracked_at
        description: "Timestamp when this version was captured"

  - name: bamboohr__employees_fields_history
    description: >
      Field-level change log for BambooHR employees.
      One row per changed field per version transition.
      Includes both standard and custom fields (from raw_data).
    columns:
      - name: entity_id
        description: "BambooHR employee ID"
        tests:
          - not_null
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: field_name
        description: "Name of the changed field"
        tests:
          - not_null
      - name: old_value
        description: "Previous value (as string)"
      - name: new_value
        description: "New value (as string)"
      - name: updated_at
        description: "Timestamp of the change"
        tests:
          - not_null
