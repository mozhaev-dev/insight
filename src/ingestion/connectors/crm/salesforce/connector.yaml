# Salesforce Connector — Airbyte Declarative Manifest
# Extracts: accounts, contacts, opportunities, opportunity_history, tasks, events, users
# Auth: OAuth 2.0 Client Credentials Flow
# Sync: incremental via SystemModstamp (users: full refresh)
# Soft deletes: all entity streams use /queryAll to include IsDeleted records
# Pagination: cursor-based via nextRecordsUrl

version: "6.44.0"

definitions:
  # --- Shared components ---

  base_requester:
    type: HttpRequester
    url_base: "{{ config['instance_url'] }}"
    http_method: GET
    authenticator:
      type: OAuthAuthenticator
      token_refresh_endpoint: "{{ config['instance_url'] }}/services/oauth2/token"
      client_id: "{{ config['client_id'] }}"
      client_secret: "{{ config['client_secret'] }}"
      grant_type: "client_credentials"
    request_headers:
      Accept: "application/json"
    error_handler:
      type: CompositeErrorHandler
      error_handlers:
        - type: DefaultErrorHandler
          response_filters:
            - type: HttpResponseFilter
              http_codes: [403]
              action: RATE_LIMITED
              error_message_contains: "REQUEST_LIMIT_EXCEEDED"
          backoff_strategies:
            - type: ConstantBackoffStrategy
              backoff_time_in_seconds: 60
        - type: DefaultErrorHandler
          response_filters:
            - type: HttpResponseFilter
              http_codes: [429]
              action: RATE_LIMITED
          backoff_strategies:
            - type: ExponentialBackoffStrategy
              factor: 5
        - type: DefaultErrorHandler
          response_filters:
            - type: HttpResponseFilter
              http_codes: [500, 502, 503, 504]
              action: RETRY
          backoff_strategies:
            - type: ExponentialBackoffStrategy
              factor: 5
          max_retries: 5

  base_paginator:
    type: DefaultPaginator
    page_token_option:
      type: RequestPath
    pagination_strategy:
      type: CursorPagination
      cursor_value: "{{ response.get('nextRecordsUrl', '') }}"
      stop_condition: "{{ response.get('done', true) }}"

  base_record_selector:
    type: RecordSelector
    extractor:
      type: DpathExtractor
      field_path:
        - records

  incremental_sync_config:
    type: DatetimeBasedCursor
    cursor_field: "SystemModstamp"
    cursor_datetime_formats:
      - "%Y-%m-%dT%H:%M:%S.%f%z"
      - "%Y-%m-%dT%H:%M:%S.%fZ"
    datetime_format: "%Y-%m-%dT%H:%M:%SZ"
    start_datetime:
      type: MinMaxDatetime
      datetime: "{{ config.get('start_date', '2020-01-01T00:00:00Z') }}"
      datetime_format: "%Y-%m-%dT%H:%M:%SZ"
      min_datetime: "2020-01-01T00:00:00Z"
    end_datetime:
      type: MinMaxDatetime
      datetime: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"
    is_client_side_incremental: true

  # --- Stream definitions ---

  accounts_stream:
    type: DeclarativeStream
    name: "accounts"
    primary_key: "pk"
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
        path: "services/data/v66.0/queryAll"
        request_parameters:
          q: >-
            SELECT Id, Name, Type, Industry, Website,
            OwnerId, ParentId,
            BillingCity, BillingState, BillingCountry,
            NumberOfEmployees, AnnualRevenue,
            IsDeleted, CreatedDate, LastModifiedDate, SystemModstamp
            {{ ', ' + ', '.join(config.get('accounts_custom_fields', [])) if config.get('accounts_custom_fields') else '' }}
            FROM Account
      record_selector:
        $ref: "#/definitions/base_record_selector"
      paginator:
        $ref: "#/definitions/base_paginator"
    incremental_sync:
      $ref: "#/definitions/incremental_sync_config"
    transformations:
      - type: AddFields
        fields:
          - path: [pk]
            value: "urn:salesforce:{{ config['tenant_id'] }}:{{ config['source_instance_id'] }}:{{ record['Id'] }}"
          - path: [tenant_id]
            value: "{{ config['tenant_id'] }}"
          - path: [source_instance_id]
            value: "{{ config['source_instance_id'] }}"
          - path: [data_source]
            value: "salesforce"
          - path: [collected_at]
            value: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: "http://json-schema.org/draft-07/schema#"
        type: object
        additionalProperties: true
        properties:
          pk:
            type: string
          tenant_id:
            type: string
          source_instance_id:
            type: string
          Id:
            type: string
          Name:
            type: ["null", string]
          Type:
            type: ["null", string]
          Industry:
            type: ["null", string]
          Website:
            type: ["null", string]
          OwnerId:
            type: ["null", string]
          ParentId:
            type: ["null", string]
          RecordTypeId:
            type: ["null", string]
          BillingCity:
            type: ["null", string]
          BillingState:
            type: ["null", string]
          BillingCountry:
            type: ["null", string]
          NumberOfEmployees:
            type: ["null", integer]
          AnnualRevenue:
            type: ["null", number]
          CreatedDate:
            type: ["null", string]
            format: date-time
          LastModifiedDate:
            type: ["null", string]
            format: date-time
          IsDeleted:
            type: ["null", boolean]
          SystemModstamp:
            type: ["null", string]
            format: date-time
          data_source:
            type: string
          collected_at:
            type: string
            format: date-time

  contacts_stream:
    type: DeclarativeStream
    name: "contacts"
    primary_key: "pk"
    retriever:
