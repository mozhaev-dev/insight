  - $ref: "#/definitions/opportunity_history_stream"
  - $ref: "#/definitions/tasks_stream"
  - $ref: "#/definitions/events_stream"
  - $ref: "#/definitions/users_stream"

check:
  type: CheckStream
  stream_names:
    - "users"

spec:
  type: Spec
  documentation_url: "https://developer.salesforce.com/docs/atlas.en-us.api_rest.meta/api_rest/"
  connection_specification:
    $schema: "http://json-schema.org/draft-07/schema#"
    title: "Salesforce Source"
    type: object
    required:
      - "tenant_id"
      - "instance_url"
      - "source_instance_id"
      - "client_id"
      - "client_secret"
    additionalProperties: true
    properties:
      tenant_id:
        type: string
        title: "Tenant ID"
        description: "Tenant isolation identifier (UUID)."
        order: 0
      instance_url:
        type: string
        title: "Instance URL"
        description: "Salesforce instance URL (e.g., 'https://mycompany.my.salesforce.com')."
        examples:
          - "https://mycompany.my.salesforce.com"
        order: 1
      source_instance_id:
        type: string
        title: "Source Instance ID"
        description: "Stable identifier for this Salesforce org (e.g., 'salesforce-acme-prod')."
        examples:
          - "salesforce-acme-prod"
        order: 2
      client_id:
        type: string
        title: "Client ID"
        description: "OAuth Consumer Key from the Salesforce External Client App."
        order: 3
      client_secret:
        type: string
        title: "Client Secret"
        description: "OAuth Consumer Secret from the Salesforce External Client App."
        airbyte_secret: true
        order: 4
      start_date:
        type: string
        title: "Start Date"
        description: "UTC date for initial incremental sync (YYYY-MM-DDTHH:MM:SSZ). Defaults to 2020-01-01."
        pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
        examples:
          - "2024-01-01T00:00:00Z"
        order: 5
      opportunities_custom_fields:
        type: array
        items:
          type: string
        title: "Opportunity Custom Fields"
        description: >-
          Optional list of custom Salesforce field API names (__c suffix) to
          include in Opportunity extraction (e.g., 'Customer_Segment__c',
          'Contract_Value__c'). Use the Describe API to discover available fields.
        default: []
        order: 6
      contacts_custom_fields:
        type: array
        items:
          type: string
        title: "Contact Custom Fields"
        description: >-
          Optional list of custom Salesforce field API names (__c suffix) to
          include in Contact extraction (e.g., 'Preferred_Language__c',
          'Customer_Tier__c').
        default: []
        order: 7
      accounts_custom_fields:
        type: array
        items:
          type: string
        title: "Account Custom Fields"
        description: >-
          Optional list of custom Salesforce field API names (__c suffix) to
          include in Account extraction (e.g., 'Account_Region__c',
          'CSM_Owner__c').
        default: []
        order: 8
