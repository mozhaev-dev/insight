          - type: AddedFieldDefinition
            path:
              - unique_key
            value: >-
              {{ config['insight_tenant_id'] }}-{{ config['insight_source_id']
              }}-{{ stream_slice['start_time'] }}-{{ record.get('project_id',
              '') }}-{{ record.get('model', '') }}-{{ record.get('user_id', '') }}

