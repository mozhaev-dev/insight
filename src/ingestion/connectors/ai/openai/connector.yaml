version: 7.0.4
type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - users

definitions:
  linked:
    HttpRequester:
      url_base: https://api.openai.com/v1
      authenticator:
        type: BearerAuthenticator
        api_token: "{{ config['openai_admin_api_key'] }}"
      request_headers:
        Content-Type: application/json
    UsagePaginator:
      type: DefaultPaginator
      page_token_option:
        type: RequestOption
        inject_into: request_parameter
        field_name: page
      pagination_strategy:
        type: CursorPagination
        cursor_value: "{{ response.get('next_page', '') }}"
        stop_condition: "{{ not response.get('has_more', false) }}"
    UsersPaginator:
      type: DefaultPaginator
      page_token_option:
        type: RequestOption
        inject_into: request_parameter
        field_name: after
      pagination_strategy:
        type: CursorPagination
        cursor_value: "{{ response.get('last_id', '') }}"
        stop_condition: "{{ not response.get('has_more', false) }}"

streams:
  # ── Stream 1: users (full refresh) ──
  - type: DeclarativeStream
    name: users
    primary_key: unique_key
    retriever:
      type: SimpleRetriever
      decoder:
        type: JsonDecoder
      requester:
        type: HttpRequester
        url_base:
          $ref: "#/definitions/linked/HttpRequester/url_base"
        authenticator:
          $ref: "#/definitions/linked/HttpRequester/authenticator"
        request_headers:
          $ref: "#/definitions/linked/HttpRequester/request_headers"
        http_method: GET
        path: organization/users
        request_parameters:
          limit: "100"
      paginator:
        $ref: "#/definitions/linked/UsersPaginator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        properties:
          unique_key:
            type: string
          tenant_id:
            type:
              - string
              - "null"
          source_id:
            type:
              - string
              - "null"
          id:
            type:
              - string
              - "null"
          object:
            type:
              - string
              - "null"
          email:
            type:
              - string
              - "null"
          name:
            type:
              - string
              - "null"
          role:
            type:
              - string
              - "null"
          added_at:
            type:
              - number
              - "null"
        required:
          - unique_key
        additionalProperties: true
    transformations:
      - type: AddFields
        fields:
          - type: AddedFieldDefinition
            path:
              - tenant_id
            value: "{{ config['insight_tenant_id'] }}"
          - type: AddedFieldDefinition
            path:
              - source_id
            value: "{{ config['insight_source_id'] }}"
          - type: AddedFieldDefinition
            path:
              - unique_key
            value: >-
              {{ config['insight_tenant_id'] }}-{{ config['insight_source_id']
              }}-{{ record['id'] }}

  # ── Stream 2: usage_completions (incremental) ──
  - type: DeclarativeStream
    name: usage_completions
    primary_key: unique_key
    retriever:
      type: SimpleRetriever
      decoder:
        type: JsonDecoder
      requester:
        type: HttpRequester
        url_base:
          $ref: "#/definitions/linked/HttpRequester/url_base"
        authenticator:
          $ref: "#/definitions/linked/HttpRequester/authenticator"
        request_headers:
          $ref: "#/definitions/linked/HttpRequester/request_headers"
        http_method: GET
        path: organization/usage/completions?group_by=project_id&group_by=model&group_by=user_id
        request_parameters:
          bucket_width: 1d
          limit: "31"
          start_time: "{{ stream_slice['start_time'] }}"
          end_time: "{{ stream_slice['start_time'] | int + 86400 }}"
      paginator:
        $ref: "#/definitions/linked/UsagePaginator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
            - "*"
            - results
            - "*"
    incremental_sync:
      type: DatetimeBasedCursor
      cursor_field: bucket_start_time
      cursor_datetime_formats:
        - "%s"
      datetime_format: "%s"
      start_datetime:
        type: MinMaxDatetime
        datetime: "{{ config.get('openai_start_date', day_delta(-90, format='%Y-%m-%d')) }}"
        datetime_format: "%Y-%m-%d"
      end_datetime:
        type: MinMaxDatetime
        datetime: "{{ now_utc().strftime('%Y-%m-%d') }}"
        datetime_format: "%Y-%m-%d"
      step: P1D
      cursor_granularity: PT1S
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        properties:
          unique_key:
            type: string
          tenant_id:
            type:
              - string
              - "null"
          source_id:
            type:
              - string
              - "null"
          bucket_start_time:
            type:
              - number
              - "null"
          bucket_end_time:
            type:
              - number
              - "null"
          input_tokens:
            type:
              - number
              - "null"
          output_tokens:
            type:
              - number
              - "null"
          input_cached_tokens:
            type:
              - number
              - "null"
          input_audio_tokens:
            type:
              - number
              - "null"
          output_audio_tokens:
            type:
              - number
              - "null"
          num_model_requests:
            type:
              - number
              - "null"
          project_id:
            type:
              - string
              - "null"
          user_id:
            type:
              - string
              - "null"
          model:
            type:
              - string
              - "null"
          batch:
            type:
              - boolean
              - "null"
          service_tier:
            type:
              - string
              - "null"
        required:
          - unique_key
        additionalProperties: true
    transformations:
      - type: AddFields
        fields:
          - type: AddedFieldDefinition
            path:
              - tenant_id
            value: "{{ config['insight_tenant_id'] }}"
          - type: AddedFieldDefinition
            path:
              - source_id
            value: "{{ config['insight_source_id'] }}"
          - type: AddedFieldDefinition
