# default_concurrency: 1 is intentional — the Enterprise Analytics API enforces
# org-level rate limits (not documented numerically). Sequential stream processing
# avoids rate-limit exhaustion during backfill. Consider bumping to 2-3 after
# observing real API behavior in production.
concurrency_level:
  type: ConcurrencyLevel
  default_concurrency: 1

spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - insight_tenant_id
      - insight_source_id
      - analytics_api_key
    properties:
      insight_tenant_id:
        type: string
        title: Insight Tenant ID
        description: Insight tenant identifier stamped onto every emitted record.
        order: 0
      insight_source_id:
        type: string
        title: Insight Source ID
        description: Instance discriminator (e.g., claude-enterprise-main).
        order: 1
      analytics_api_key:
        type: string
        title: Analytics API Key
        description: >-
          Enterprise Analytics API key with read:analytics scope. Created at
          claude.ai/analytics/api-keys by an organization Primary Owner.
        airbyte_secret: true
        order: 2
      start_date:
        type: string
        title: Start Date
        description: >-
          Optional earliest date to collect from (YYYY-MM-DD). Defaults to 14
          days ago. Values earlier than 2026-01-01 are silently clamped to that
          floor (the API rejects pre-2026 dates).
        format: date
        order: 3
      base_url:
        type: string
        title: API Base URL (override)
        description: >-
          Optional API base URL override for development against a stub
          service. Defaults to https://api.anthropic.com — production
          deployments should leave the default in place.
        default: https://api.anthropic.com
        order: 4
    additionalProperties: true

metadata:
  autoImportSchema:
    claude_enterprise_summaries: false
    claude_enterprise_users: false
    claude_enterprise_chat_projects: false
    claude_enterprise_skills: false
    claude_enterprise_connectors: false
