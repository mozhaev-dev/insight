version: 7.0.4

type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - claude_enterprise_summaries

definitions:
  # error_handler is at top-level definitions (NOT under linked) per create.md §3.1:
  # "Do NOT put error_handler in definitions.linked — Builder strips linked error handlers."
  retryable_error_handler:
    type: CompositeErrorHandler
    error_handlers:
      - type: DefaultErrorHandler
        response_filters:
          - type: HttpResponseFilter
            action: RATE_LIMITED
            http_codes:
              - 429
        backoff_strategies:
          - type: WaitTimeFromHeader
            header: Retry-After
      - type: DefaultErrorHandler
        max_retries: 5
        response_filters:
          - type: HttpResponseFilter
            action: RETRY
            http_codes:
              - 503
              - 500
              - 502
              - 504
        backoff_strategies:
          - type: ExponentialBackoffStrategy
            factor: 5
      - type: DefaultErrorHandler
        response_filters:
          - type: HttpResponseFilter
            action: FAIL
            http_codes:
              - 401
              - 404
            error_message: >-
              Authentication or scope error: verify the analytics_api_key has
              the read:analytics scope (created at claude.ai/analytics/api-keys
              by a Primary Owner).

  linked:
    HttpRequester:
      authenticator:
        type: ApiKeyAuthenticator
        api_token: "{{ config['analytics_api_key'] }}"
        header: x-api-key
      request_headers:
        anthropic-version: "2023-06-01"
        Accept: application/json
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_token_option:
          type: RequestOption
          inject_into: request_parameter
          field_name: page
        pagination_strategy:
          type: CursorPagination
          cursor_value: "{{ response.get('next_page', '') }}"
          stop_condition: "{{ response.get('next_page') is none or response.get('next_page') == '' }}"

streams:
  # ─────────────────────────────────────────────────────────────────────────
  # Stream 1: claude_enterprise_summaries (incremental, 31-day step)
  # GET /v1/organizations/analytics/summaries?starting_date&ending_date
  # ─────────────────────────────────────────────────────────────────────────
  - type: DeclarativeStream
    name: claude_enterprise_summaries
    primary_key:
      - unique_key
    supported_sync_modes:
      - full_refresh
      - incremental
    retriever:
      type: SimpleRetriever
      decoder:
        type: JsonDecoder
      requester:
        type: HttpRequester
        url: "{{ config.get('base_url', 'https://api.anthropic.com') }}/v1/organizations/analytics/summaries"
        http_method: GET
        authenticator:
          $ref: "#/definitions/linked/HttpRequester/authenticator"
        request_headers:
          $ref: "#/definitions/linked/HttpRequester/request_headers"
        error_handler:
          $ref: "#/definitions/retryable_error_handler"
      paginator:
        type: NoPagination
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          # The /summaries endpoint wraps records under "summaries" (unlike
          # the other Enterprise Analytics endpoints which use "data").
          # Using "data" here would silently return 0 records.
          field_path:
            - summaries
    incremental_sync:
      type: DatetimeBasedCursor
      cursor_field: date
      cursor_datetime_formats:
        - "%Y-%m-%d"
      datetime_format: "%Y-%m-%d"
      start_datetime:
        type: MinMaxDatetime
        datetime: "{{ config.get('start_date') or day_delta(-14, format='%Y-%m-%d') }}"
        datetime_format: "%Y-%m-%d"
        min_datetime: "2026-01-01"
      end_datetime:
        type: MinMaxDatetime
        datetime: "{{ day_delta(-3, format='%Y-%m-%d') }}"
        datetime_format: "%Y-%m-%d"
      # P1D step: one request per day. The /summaries endpoint supports multi-day
      # ranges via starting_date + ending_date, but ending_date is EXCLUSIVE — using
      # P31D with Airbyte's inclusive-inclusive cursor arithmetic causes silent data
      # loss at 31-day boundaries. P1D + no end_time_option avoids this: each request
      # sends only starting_date and the API returns that single day's summary.
      step: P1D
      cursor_granularity: P1D
      start_time_option:
        type: RequestOption
        field_name: starting_date
        inject_into: request_parameter
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        properties:
          unique_key:
            type: string
          tenant_id:
            type:
              - string
              - "null"
          source_id:
            type:
              - string
              - "null"
          date:
            type: string
          # API-native time bounds — /summaries returns starting_at / ending_at
          # for each day's record; we keep them for diagnostic parity with the
          # API response. `date` (derived from stream_interval) is the canonical
          # day field used downstream.
          starting_at:
            type:
              - string
              - "null"
          ending_at:
            type:
              - string
              - "null"
          daily_active_user_count:
            type:
              - integer
              - "null"
          weekly_active_user_count:
            type:
              - integer
              - "null"
          monthly_active_user_count:
            type:
              - integer
              - "null"
          daily_adoption_rate:
            type:
              - number
              - "null"
          weekly_adoption_rate:
            type:
              - number
              - "null"
          monthly_adoption_rate:
            type:
              - number
              - "null"
          assigned_seat_count:
            type:
              - integer
              - "null"
          pending_invite_count:
            type:
              - integer
              - "null"
          cowork_daily_active_user_count:
            type:
              - integer
              - "null"
          cowork_weekly_active_user_count:
            type:
              - integer
              - "null"
          cowork_monthly_active_user_count:
            type:
              - integer
              - "null"
          collected_at:
            type:
              - string
              - "null"
          data_source:
            type:
              - string
              - "null"
        required:
          - unique_key
          - tenant_id
          - source_id
        additionalProperties: true
    transformations:
      - type: AddFields
        fields:
          - type: AddedFieldDefinition
            path:
              - tenant_id
            value: "{{ config['insight_tenant_id'] }}"
          - type: AddedFieldDefinition
            path:
              - source_id
            value: "{{ config['insight_source_id'] }}"
          - type: AddedFieldDefinition
            path:
              - data_source
            value: insight_claude_enterprise
          - type: AddedFieldDefinition
            path:
              - collected_at
            value: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"
          # API response records don't include a `date` field (only `starting_at`
          # / `ending_at`). Derive `date` from the cursor's stream_interval —
          # with P1D step this matches the `starting_date` request parameter
          # exactly. Same pattern used in users/skills/connectors/chat_projects.
          - type: AddedFieldDefinition
            path:
              - date
            value: "{{ stream_interval['start_time'][:10] }}"
          - type: AddedFieldDefinition
            path:
              - unique_key
            value: >-
              {{ config['insight_tenant_id'] }}-{{ config['insight_source_id']
              }}-{{ stream_interval['start_time'][:10] }}

