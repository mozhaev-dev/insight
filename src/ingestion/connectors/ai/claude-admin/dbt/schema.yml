version: 2

sources:
  - name: bronze_claude_admin
    schema: bronze_claude_admin
    tables:
      - name: claude_admin_users
      - name: claude_admin_messages_usage
      - name: claude_admin_cost_report
      - name: claude_admin_code_usage
      - name: claude_admin_api_keys
      - name: claude_admin_workspaces
      - name: claude_admin_workspace_members
      - name: claude_admin_invites
      - name: claude_admin_collection_runs

models:
  - name: claude_admin__ai_api_usage
    description: >
      Bronze → Silver step 1: Anthropic Admin API programmatic token usage.
      Feeds class_ai_api_usage with channel='api' and email=NULL — programmatic
      API key authentication cannot be attributed to individual users. Per-user
      attribution comes from claude_enterprise__ai_api_usage (channel='web'/
      'office'/'cowork').
    columns:
      - name: insight_tenant_id
        tests:
          - not_null
      - name: source_id
      - name: unique_key
        description: "Composite dedup key: tenant-source-workspace-day-provider-channel-model-key-tier-context"
        tests:
          - not_null
          - unique
      - name: email
        description: "Always NULL — programmatic API has no per-user attribution"
      - name: person_id
      - name: workspace_id
        description: "Anthropic workspace identifier (nullable)"
      - name: day
        description: "Usage date (UTC)"
        tests:
          - not_null
      - name: provider
        description: "Always 'anthropic'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['anthropic']
      - name: channel
        description: "Always 'api'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['api']
      - name: conversation_count
        description: "NULL for API rows"
      - name: message_count
        description: "NULL for API rows"
      - name: input_tokens
        description: "uncached_input + cache_read + cache_creation_5m + cache_creation_1h"
      - name: output_tokens
      - name: cache_read_tokens
      - name: cache_creation_tokens
        description: "cache_creation_5m_tokens + cache_creation_1h_tokens"
      - name: cost_amount
        description: "NULL in MVP; future enrichment via claude_admin_cost_report"
      - name: cost_currency
      - name: source
        description: "Always 'claude_admin'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['claude_admin']
      - name: data_source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['insight_claude_admin']
      - name: collected_at
        tests:
          - not_null

  - name: claude_admin__ai_dev_usage
    description: >
      Bronze → Silver step 1: Claude Code per-user daily usage.
      Feeds class_ai_dev_usage with tool='claude_code'. Filtered to
      actor_type='user' so actor_identifier carries the user email.
      Claude Code usage is also available in Enterprise but is sourced
      from Admin only, per the lead's merge rule.
    columns:
      - name: insight_tenant_id
        tests:
          - not_null
      - name: source_id
      - name: unique_key
        description: "Composite dedup key: tenant-source-email-day"
        tests:
          - not_null
          - unique
      - name: email
        description: "User email (actor_identifier) — identity key"
        tests:
          - not_null
      - name: person_id
      - name: day
        description: "Usage date (UTC)"
        tests:
          - not_null
      - name: tool
        description: "Always 'claude_code'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['claude_code']
      - name: session_count
        description: "Number of Claude Code sessions (aggregated across terminal_type)"
      - name: lines_added
      - name: lines_removed
      - name: tool_use_offered
        description: "tool_use_accepted + tool_use_rejected"
      - name: tool_use_accepted
        description: "Accepted tool actions (Edit/Write/MultiEdit/NotebookEdit)"
      - name: completions_count
        description: "NULL — not reported by Claude Code"
      - name: agent_sessions
        description: "NULL — not reported by Claude Code"
      - name: chat_requests
        description: "NULL — not reported by Claude Code"
      - name: cost_cents
        description: "NULL — Claude Code reports no per-user cost"
      - name: source
        description: "Always 'claude_admin'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['claude_admin']
      - name: data_source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['insight_claude_admin']
      - name: collected_at
        tests:
          - not_null
