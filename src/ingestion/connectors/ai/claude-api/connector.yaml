version: "6.2.0"
type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - claude_api_workspaces

definitions:
  api_key_authenticator:
    type: ApiKeyAuthenticator
    api_token: "{{ config['admin_api_key'] }}"
    header: x-api-key

  anthropic_headers:
    anthropic-version: "2023-06-01"
    Content-Type: application/json
    Cache-Control: no-cache, no-store

  tenant_id_injection:
    type: AddFields
    fields:
      - path: [tenant_id]
        value: "{{ config['tenant_id'] }}"
      - path: [insight_source_id]
        value: "{{ config.get('insight_source_id', '') }}"
      - path: [collected_at]
        value: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"
      - path: [data_source]
        value: insight_claude_api

  cursor_paginator:
    type: DefaultPaginator
    pagination_strategy:
      type: CursorPagination
      cursor_value: "{{ response.get('next_page', '') }}"
      stop_condition: "{{ response.get('next_page') is none or response.get('next_page') == '' }}"
    page_token_option:
      type: RequestOption
      inject_into: request_parameter
      field_name: page

  offset_paginator:
    type: DefaultPaginator
    pagination_strategy:
      type: OffsetIncrement
      page_size: 1000
    page_token_option:
      type: RequestOption
      inject_into: request_parameter
      field_name: offset
    page_size_option:
      type: RequestOption
      inject_into: request_parameter
      field_name: limit

streams:
  # ── Stream 1: claude_api_messages_usage (incremental, cursor pagination) ──
  - type: DeclarativeStream
    name: claude_api_messages_usage
    primary_key:
      - unique
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: http://json-schema.org/schema#
        type: object
        properties:
          tenant_id:
            type: string
          insight_source_id:
            type: string
          unique:
            type: string
          date:
            type: string
          model:
            type:
              - string
              - "null"
          api_key_id:
            type:
              - string
              - "null"
          workspace_id:
            type:
              - string
              - "null"
          service_tier:
            type:
              - string
              - "null"
          context_window:
            type:
              - string
              - "null"
          inference_geo:
            type:
              - string
              - "null"
          speed:
            type:
              - string
              - "null"
          uncached_input_tokens:
            type: number
          cache_read_tokens:
            type: number
          cache_creation_5m_tokens:
            type: number
          cache_creation_1h_tokens:
            type: number
          output_tokens:
            type: number
          web_search_requests:
            type: number
          collected_at:
            type: string
          data_source:
            type: string
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url_base: https://api.anthropic.com
        path: "/v1/organizations/usage_report/messages?group_by[]=model&group_by[]=api_key_id&group_by[]=workspace_id&group_by[]=service_tier&group_by[]=context_window"
        http_method: GET
        request_headers:
          $ref: "#/definitions/anthropic_headers"
        authenticator:
          $ref: "#/definitions/api_key_authenticator"
        request_parameters:
          bucket_width: "1d"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
            - "0"
            - results
      paginator:
        $ref: "#/definitions/cursor_paginator"
    transformations:
      - $ref: "#/definitions/tenant_id_injection"
      - type: AddFields
        fields:
          - path: [date]
            value: "{{ stream_interval['start_time'][:10] }}"
          - path: [cache_read_tokens]
            value: "{{ record.get('cache_read_input_tokens', 0) }}"
          - path: [cache_creation_5m_tokens]
            value: "{{ record.get('cache_creation', {}).get('ephemeral_5m_input_tokens', 0) }}"
          - path: [cache_creation_1h_tokens]
            value: "{{ record.get('cache_creation', {}).get('ephemeral_1h_input_tokens', 0) }}"
          - path: [web_search_requests]
            value: "{{ record.get('server_tool_use', {}).get('web_search_requests', 0) }}"
          - path: [unique]
            value: "{{ stream_interval['start_time'][:10] }}|{{ record.get('model') or '' }}|{{ record.get('api_key_id') or '' }}|{{ record.get('workspace_id') or '' }}|{{ record.get('service_tier') or '' }}|{{ record.get('context_window') or '' }}"
    incremental_sync:
      type: DatetimeBasedCursor
      cursor_field: date
      cursor_datetime_formats:
        - "%Y-%m-%dT%H:%M:%SZ"
        - "%Y-%m-%d"
      datetime_format: "%Y-%m-%dT%H:%M:%SZ"
      start_datetime:
        type: MinMaxDatetime
        datetime: "{{ config.get('start_date', day_delta(-90, format='%Y-%m-%dT00:00:00Z')) }}"
        datetime_format: "%Y-%m-%dT%H:%M:%SZ"
      step: P1D
      cursor_granularity: PT1S
      start_time_option:
        type: RequestOption
        field_name: starting_at
        inject_into: request_parameter
      end_time_option:
        type: RequestOption
        field_name: ending_at
        inject_into: request_parameter

  # ── Stream 2: claude_api_cost_report (incremental, cursor pagination) ──
  - type: DeclarativeStream
    name: claude_api_cost_report
    primary_key:
      - unique
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: http://json-schema.org/schema#
        type: object
        properties:
          tenant_id:
            type: string
          insight_source_id:
            type: string
          unique:
            type: string
          date:
            type: string
          workspace_id:
            type:
              - string
              - "null"
          description:
            type:
              - string
              - "null"
          amount:
            type:
              - string
              - "null"
          currency:
            type:
              - string
              - "null"
          cost_type:
            type:
              - string
              - "null"
          model:
            type:
              - string
              - "null"
          service_tier:
            type:
              - string
              - "null"
          context_window:
            type:
              - string
              - "null"
          token_type:
            type:
              - string
              - "null"
          inference_geo:
            type:
              - string
              - "null"
          collected_at:
            type: string
          data_source:
            type: string
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url_base: https://api.anthropic.com
        path: "/v1/organizations/cost_report?group_by[]=workspace_id&group_by[]=description"
        http_method: GET
        request_headers:
          $ref: "#/definitions/anthropic_headers"
        authenticator:
          $ref: "#/definitions/api_key_authenticator"
        request_parameters:
          bucket_width: "1d"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
            - "0"
            - results
      paginator:
        $ref: "#/definitions/cursor_paginator"
    transformations:
      - $ref: "#/definitions/tenant_id_injection"
      - type: AddFields
        fields:
          - path: [date]
            value: "{{ stream_interval['start_time'][:10] }}"
          - path: [unique]
            value: "{{ stream_interval['start_time'][:10] }}|{{ record.get('workspace_id') or '' }}|{{ record.get('description') or '' }}"
    incremental_sync:
      type: DatetimeBasedCursor
      cursor_field: date
      cursor_datetime_formats:
        - "%Y-%m-%dT%H:%M:%SZ"
        - "%Y-%m-%d"
      datetime_format: "%Y-%m-%dT%H:%M:%SZ"
      start_datetime:
        type: MinMaxDatetime
        datetime: "{{ config.get('start_date', day_delta(-90, format='%Y-%m-%dT00:00:00Z')) }}"
        datetime_format: "%Y-%m-%dT%H:%M:%SZ"
      step: P1D
      cursor_granularity: PT1S
      start_time_option:
        type: RequestOption
        field_name: starting_at
        inject_into: request_parameter
      end_time_option:
        type: RequestOption
        field_name: ending_at
        inject_into: request_parameter

  # ── Stream 3: claude_api_keys (full refresh, offset pagination) ──
  - type: DeclarativeStream
    name: claude_api_keys
    primary_key:
      - id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: http://json-schema.org/schema#
        type: object
        properties:
          tenant_id:
            type: string
          insight_source_id:
            type: string
          id:
            type: string
          name:
            type: string
          status:
            type: string
          created_at:
            type:
              - string
              - "null"
          created_by_id:
            type:
              - string
              - "null"
          created_by_name:
            type:
              - string
              - "null"
          created_by_type:
            type:
              - string
              - "null"
          workspace_id:
            type:
              - string
              - "null"
          partial_key_hint:
            type:
              - string
              - "null"
          collected_at:
            type: string
          data_source:
            type: string
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url_base: https://api.anthropic.com
        path: /v1/organizations/api_keys
        http_method: GET
        request_headers:
          $ref: "#/definitions/anthropic_headers"
        authenticator:
          $ref: "#/definitions/api_key_authenticator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
      paginator:
        $ref: "#/definitions/offset_paginator"
    transformations:
      - $ref: "#/definitions/tenant_id_injection"
      - type: AddFields
        fields:
          - path: [created_by_id]
            value: "{{ record.get('created_by', {}).get('id', '') }}"
          - path: [created_by_name]
            value: "{{ record.get('created_by', {}).get('name', '') }}"
          - path: [created_by_type]
            value: "{{ record.get('created_by', {}).get('type', '') }}"

  # ── Stream 4: claude_api_workspaces (full refresh) ──
  - type: DeclarativeStream
    name: claude_api_workspaces
    primary_key:
      - id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: http://json-schema.org/schema#
        type: object
        properties:
          tenant_id:
            type: string
          insight_source_id:
            type: string
          id:
            type: string
          name:
            type: string
          display_name:
            type:
              - string
              - "null"
          created_at:
            type:
              - string
              - "null"
          archived_at:
            type:
              - string
              - "null"
          data_residency:
            type:
              - string
              - "null"
          collected_at:
            type: string
          data_source:
            type: string
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url_base: https://api.anthropic.com
        path: /v1/organizations/workspaces
        http_method: GET
        request_headers:
          $ref: "#/definitions/anthropic_headers"
        authenticator:
          $ref: "#/definitions/api_key_authenticator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
      paginator:
        $ref: "#/definitions/offset_paginator"
    transformations:
      - $ref: "#/definitions/tenant_id_injection"
      - type: AddFields
        fields:
          - path: [data_residency]
            value: "{{ record.get('data_residency', {}) | tojson if record.get('data_residency') else '' }}"

  # ── Stream 5: claude_api_invites (full refresh) ──
  - type: DeclarativeStream
    name: claude_api_invites
    primary_key:
      - id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: http://json-schema.org/schema#
        type: object
        properties:
          tenant_id:
            type: string
          insight_source_id:
            type: string
          id:
            type: string
          email:
            type: string
          role:
            type: string
          status:
            type: string
          created_at:
            type:
              - string
              - "null"
          expires_at:
            type:
              - string
              - "null"
          workspace_id:
            type:
              - string
              - "null"
          collected_at:
            type: string
          data_source:
            type: string
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        url_base: https://api.anthropic.com
        path: /v1/organizations/invites
        http_method: GET
        request_headers:
          $ref: "#/definitions/anthropic_headers"
        authenticator:
          $ref: "#/definitions/api_key_authenticator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - data
      paginator:
        $ref: "#/definitions/offset_paginator"
    transformations:
      - $ref: "#/definitions/tenant_id_injection"

spec:
  type: Spec
  connection_specification:
    $schema: http://json-schema.org/draft-07/schema#
    type: object
    required:
      - tenant_id
      - admin_api_key
    properties:
      tenant_id:
        type: string
        title: Tenant ID
        description: Tenant isolation identifier (UUID)
        order: 0
      admin_api_key:
        type: string
        title: Admin API Key
        description: Anthropic Admin API key (from Anthropic Console)
        airbyte_secret: true
        order: 1
      insight_source_id:
        type: string
        title: Source Instance ID
        description: Optional connector instance identifier for multi-instance deployments
        default: ""
        order: 2
      start_date:
        type: string
        title: Start Date
        description: "Earliest date to collect data from (ISO 8601, e.g. 2026-01-01T00:00:00Z). Defaults to 90 days ago."
        order: 3
    additionalProperties: true

metadata:
  autoImportSchema:
    claude_api_messages_usage: true
    claude_api_cost_report: true
    claude_api_keys: true
    claude_api_workspaces: true
    claude_api_invites: true
