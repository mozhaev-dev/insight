version: 6.60.9

type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - users_details

concurrency_level:
  type: ConcurrencyLevel
  default_concurrency: 1

definitions:
  base_requester:
    type: HttpRequester
    url_base: https://slack.com/api/
    authenticator:
      type: BearerAuthenticator
      api_token: "{{ config['slack_bot_token'] }}"
    request_headers:
      Accept: application/json

  streams:
    # -- users_details -------------------------------------------------------
    # Single stream sourced from admin.analytics.getFile (type=member).
    # Requires only the admin.analytics:read scope.
    # One HTTP call per day; response is gzip-wrapped JSON Lines.
    users_details:
      type: DeclarativeStream
      name: users_details
      retriever:
        type: SimpleRetriever
        requester:
          $ref: "#/definitions/base_requester"
          path: admin.analytics.getFile
          http_method: GET
          request_parameters:
            type: member
        decoder:
          type: GzipDecoder
          decoder:
            type: JsonlDecoder
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path: []
      incremental_sync:
        type: DatetimeBasedCursor
        cursor_field: date
        cursor_datetime_formats:
          - "%Y-%m-%d"
        datetime_format: "%Y-%m-%d"
        start_datetime:
          type: MinMaxDatetime
          datetime: "{{ config['slack_start_date'] }}"
          datetime_format: "%Y-%m-%d"
        end_datetime:
          type: MinMaxDatetime
          datetime: "{{ (now_utc() - duration('P2D')).strftime('%Y-%m-%d') }}"
          datetime_format: "%Y-%m-%d"
        start_time_option:
          type: RequestOption
          field_name: date
          inject_into: request_parameter
        step: P1D
        cursor_granularity: P1D
      primary_key:
        - unique_key
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: "#/schemas/users_details"
      transformations:
        - type: AddFields
          fields:
            - type: AddedFieldDefinition
              path:
                - tenant_id
              value: "{{ config['insight_tenant_id'] }}"
            - type: AddedFieldDefinition
              path:
                - source_id
              value: "{{ config['insight_source_id'] }}"
            - type: AddedFieldDefinition
              path:
                - unique_key
              value: "{{ config['insight_tenant_id'] }}-{{ config['insight_source_id'] }}-{{ record['user_id'] }}-{{ record['date'] }}"

streams:
  - $ref: "#/definitions/streams/users_details"

spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - insight_tenant_id
      - insight_source_id
      - slack_bot_token
      - slack_start_date
    properties:
      insight_tenant_id:
        type: string
        title: Insight Tenant ID
        description: Tenant isolation identifier stamped onto every emitted record.
        order: 0
      insight_source_id:
        type: string
        title: Insight Source ID
        description: >-
          Unique identifier for this connector instance (e.g., slack-main).
          Disambiguates workspaces in multi-workspace setups.
        order: 1
      slack_bot_token:
        type: string
        title: Slack User OAuth Token
        description: >-
          Slack user OAuth token (xoxp-*) with admin.analytics:read scope.
          Slack's admin.analytics.getFile requires a user token — bot tokens
          (xoxb-*) are not supported. Token must be installed by an Org
          Owner/Admin. Plan must support Analytics API (Business+ or
          Enterprise Grid).
        airbyte_secret: true
        order: 2
      slack_start_date:
        type: string
        title: Start Date
        description: >-
          Earliest analytics date to fetch (YYYY-MM-DD). Slack publishes snapshots
          with a ~2-day delay, so end of range is pinned to today - 2 days.
          Recommended: 14 days ago.
        format: date
        order: 3
    additionalProperties: true

metadata:
  assist: {}
  autoImportSchema:
    users_details: false

schemas:
  users_details:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    properties:
      unique_key:
        type: string
      tenant_id:
        type: string
      source_id:
        type: string
      date:
        type: string
      team_id:
        type:
          - string
          - "null"
      user_id:
        type: string
      email_address:
        type:
          - string
          - "null"
      is_guest:
        type:
          - boolean
          - "null"
      is_billable_seat:
        type:
          - boolean
          - "null"
      is_active:
        type:
          - boolean
          - "null"
      is_active_ios:
        type:
          - boolean
          - "null"
      is_active_android:
        type:
          - boolean
          - "null"
      is_active_desktop:
        type:
          - boolean
          - "null"
      is_active_apps:
        type:
          - boolean
          - "null"
      is_active_workflows:
        type:
          - boolean
          - "null"
      is_active_slack_connect:
        type:
          - boolean
          - "null"
      reactions_added_count:
        type:
          - integer
          - "null"
      messages_posted_count:
        type:
          - integer
          - "null"
      channel_messages_posted_count:
        type:
          - integer
          - "null"
      files_added_count:
        type:
          - integer
          - "null"
      total_calls_count:
        type:
          - integer
          - "null"
      slack_calls_count:
        type:
          - integer
          - "null"
      slack_huddles_count:
        type:
          - integer
          - "null"
      search_count:
        type:
          - integer
          - "null"
      date_claimed:
        type:
          - integer
          - "null"
    required:
      - unique_key
      - tenant_id
      - source_id
      - user_id
      - date
    additionalProperties: true
