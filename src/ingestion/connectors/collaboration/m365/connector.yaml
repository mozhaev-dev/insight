  - type: DeclarativeStream
    name: users
    retriever:
      type: SimpleRetriever
      paginator:
        $ref: "#/definitions/linked/SimpleRetriever/paginator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - value
      requester:
        type: HttpRequester
        http_method: GET
        authenticator:
          type: SessionTokenAuthenticator
          login_requester:
            type: HttpRequester
            url: >-
              https://login.microsoftonline.com/{{ config['azure_tenant_id']
              }}/oauth2/v2.0/token
            http_method: GET
            request_body:
              $ref: "#/definitions/linked/HttpRequester/request_body"
          session_token_path:
            - access_token
          expiration_duration: PT1H
          request_authentication:
            type: Bearer
        request_parameters:
          $select: id,userPrincipalName,displayName,mail,accountEnabled
          $filter: accountEnabled eq true
        url: https://graph.microsoft.com/v1.0/users
        error_handler:
          type: DefaultErrorHandler
          backoff_strategies:
            - type: WaitTimeFromHeader
              header: Retry-After
          response_filters:
            - type: HttpResponseFilter
              action: RETRY
              http_codes: [429, 503]
            - type: HttpResponseFilter
              action: FAIL
              http_codes: [403]
              error_message: >-
                HTTP 403 from GET /users — the Azure AD app lacks the
                `User.Read.All` Application permission (admin consent
                required). The calendar_events substream depends on
                this directory and will not run until the scope is
                granted. Fix: Azure AD → App registrations → <this
                app> → API permissions → Microsoft Graph → Application
                permissions → User.Read.All → Grant admin consent.
            - type: HttpResponseFilter
              action: FAIL
              http_codes: [401]
              error_message: >-
                HTTP 401 from GET /users — token rejected. Check
                azure_client_id / azure_client_secret in the connector
                Secret, and verify azure_tenant_id matches the tenant
                that issued the app registration.
    primary_key:
      - id
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        properties:
          id:
            type: string
          userPrincipalName:
            type:
              - string
              - "null"
          displayName:
            type:
              - string
              - "null"
          mail:
            type:
              - string
              - "null"
          accountEnabled:
            type:
              - boolean
              - "null"
          tenant_id:
            type: string
          source_id:
            type: string
        required:
          - id
        additionalProperties: true
    transformations:
      - type: AddFields
        fields:
          - type: AddedFieldDefinition
            path:
              - tenant_id
            value: "{{ config['insight_tenant_id'] }}"
          - type: AddedFieldDefinition
            path:
              - source_id
            value: "{{ config['insight_source_id'] }}"
  - type: DeclarativeStream
    name: calendar_events
    retriever:
      type: SimpleRetriever
      paginator:
        $ref: "#/definitions/linked/SimpleRetriever/paginator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - value
      requester:
        type: HttpRequester
        http_method: GET
        authenticator:
          type: SessionTokenAuthenticator
          login_requester:
            type: HttpRequester
            url: >-
              https://login.microsoftonline.com/{{ config['azure_tenant_id']
              }}/oauth2/v2.0/token
            http_method: GET
            request_body:
              $ref: "#/definitions/linked/HttpRequester/request_body"
          session_token_path:
            - access_token
          expiration_duration: PT1H
          request_authentication:
            type: Bearer
        request_parameters:
          startDateTime: "{{ stream_slice.start_time }}T00:00:00Z"
          endDateTime: "{{ stream_slice.end_time }}T00:00:00Z"
          $select: id,subject,start,end,organizer,attendees,isOnlineMeeting,onlineMeetingProvider,onlineMeeting,location,bodyPreview,webLink,isCancelled,showAs,sensitivity,seriesMasterId,type
          $top: '200'
        url: >-
          https://graph.microsoft.com/v1.0/users/{{ stream_partition.user_id
          }}/calendarView
        error_handler:
          type: DefaultErrorHandler
          backoff_strategies:
            - type: WaitTimeFromHeader
              header: Retry-After
          response_filters:
            - type: HttpResponseFilter
              action: RETRY
              http_codes: [429, 503]
            - type: HttpResponseFilter
              action: FAIL
              http_codes: [403]
              error_message: >-
                HTTP 403 from GET /users/{id}/calendarView — the Azure
                AD app lacks the `Calendars.Read` Application permission
                (admin consent required). This stream cannot run without
                it; other m365 streams are unaffected. Fix: Azure AD →
                App registrations → <this app> → API permissions →
                Microsoft Graph → Application permissions →
                Calendars.Read → Grant admin consent. Note for ops:
                many security teams will NOT approve this scope (it
                grants tenant-wide read of every user's calendar) — if
                that is the case, disable the calendar_events stream in
                the configured catalog rather than letting it fail every
                sync. The downstream silver classes class_meeting_invite
                and class_meeting / class_meeting_attendance (calendar
                joins) will then produce zero rows, which is the
                intended graceful degradation.
            - type: HttpResponseFilter
              action: FAIL
              http_codes: [401]
              error_message: >-
                HTTP 401 from GET /users/{id}/calendarView — token
                rejected. Same root cause as for the users stream
                (auth misconfig). Check azure_client_id /
                azure_client_secret and azure_tenant_id.
      partition_router:
        type: SubstreamPartitionRouter
        parent_stream_configs:
          - stream: "#/streams/4"
            parent_key: id
            partition_field: user_id
    primary_key:
      - unique_key
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        properties:
          id:
            type: string
          subject:
            type:
              - string
              - "null"
          start:
            type:
              - object
              - "null"
            properties:
              dateTime:
                type:
                  - string
                  - "null"
              timeZone:
                type:
                  - string
                  - "null"
          end:
            type:
              - object
              - "null"
            properties:
              dateTime:
                type:
                  - string
                  - "null"
              timeZone:
                type:
                  - string
                  - "null"
          organizer:
            type:
              - object
              - "null"
          attendees:
            type:
              - array
              - "null"
          isOnlineMeeting:
            type:
              - boolean
              - "null"
          onlineMeetingProvider:
            type:
              - string
              - "null"
          onlineMeeting:
            type:
              - object
              - "null"
          location:
            type:
              - object
              - "null"
          bodyPreview:
            type:
              - string
              - "null"
          webLink:
            type:
              - string
              - "null"
          isCancelled:
            type:
              - boolean
              - "null"
          showAs:
            type:
              - string
              - "null"
          sensitivity:
            type:
              - string
              - "null"
          seriesMasterId:
            type:
              - string
              - "null"
          type:
            type:
              - string
              - "null"
          user_id:
            type: string
          tenant_id:
            type: string
          source_id:
            type: string
          unique_key:
            type: string
        required:
          - unique_key
          - id
        additionalProperties: true
    transformations:
      - type: AddFields
        fields:
          - type: AddedFieldDefinition
            path:
              - user_id
            value: "{{ stream_partition.user_id }}"
          - type: AddedFieldDefinition
            path:
              - tenant_id
            value: "{{ config['insight_tenant_id'] }}"
          - type: AddedFieldDefinition
            path:
              - source_id
            value: "{{ config['insight_source_id'] }}"
          - type: AddedFieldDefinition
            path:
              - unique_key
            value: >-
              {{ config['insight_tenant_id'] }}-{{ config['insight_source_id']
              }}-{{ stream_partition.user_id }}-{{ record['id'] }}
    incremental_sync:
      type: DatetimeBasedCursor
      step: P1D
      cursor_field: start.dateTime
      end_datetime:
        type: MinMaxDatetime
        datetime: "{{ (today_utc() + duration('P1D')).strftime('%Y-%m-%d') }}"
        datetime_format: "%Y-%m-%d"
      start_datetime:
        type: MinMaxDatetime
        datetime: "{{ (today_utc() - duration('P30D')).strftime('%Y-%m-%d') }}"
        datetime_format: "%Y-%m-%d"
      datetime_format: "%Y-%m-%dT%H:%M:%S%z"
      lookback_window: P0D
      cursor_granularity: P1D

