version: 7.0.4

type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - email_activity

definitions:
  linked:
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_token_option:
          type: RequestPath
        pagination_strategy:
          type: CursorPagination
          cursor_value: "{{ response.get('@odata.nextLink', '') }}"
          stop_condition: "{{ not response.get('@odata.nextLink') }}"
    HttpRequester:
      request_body:
        type: RequestBodyUrlEncodedForm
        value:
          scope: https://graph.microsoft.com/.default
          client_id: "{{ config['azure_client_id'] }}"
          grant_type: client_credentials
          client_secret: "{{ config['azure_client_secret'] }}"
      authenticator:
        type: SessionTokenAuthenticator
        login_requester:
          type: HttpRequester
          url: >-
            https://login.microsoftonline.com/{{ config['azure_tenant_id']
            }}/oauth2/v2.0/token
          http_method: GET
          request_body:
            type: RequestBodyUrlEncodedForm
            value:
              scope: https://graph.microsoft.com/.default
              client_id: "{{ config['azure_client_id'] }}"
              grant_type: client_credentials
              client_secret: "{{ config['azure_client_secret'] }}"
        session_token_path:
          - access_token
        expiration_duration: PT1H
        request_authentication:
          type: Bearer
      request_parameters:
        $format: application/json

streams:
  - type: DeclarativeStream
    name: email_activity
    retriever:
      type: SimpleRetriever
      paginator:
        $ref: "#/definitions/linked/SimpleRetriever/paginator"
      record_selector:
        type: RecordSelector
        extractor:
          type: DpathExtractor
          field_path:
            - value
      requester:
        type: HttpRequester
        http_method: GET
        authenticator:
          type: SessionTokenAuthenticator
          login_requester:
            type: HttpRequester
            url: >-
              https://login.microsoftonline.com/{{ config['azure_tenant_id']
              }}/oauth2/v2.0/token
            http_method: GET
            request_body:
              $ref: "#/definitions/linked/HttpRequester/request_body"
          session_token_path:
            - access_token
          expiration_duration: PT1H
          request_authentication:
            type: Bearer
        request_parameters:
          $ref: "#/definitions/linked/HttpRequester/request_parameters"
        url: >-
          https://graph.microsoft.com/beta/reports/getEmailActivityUserDetail(date={{
          stream_slice.start_time }})
    primary_key:
      - unique_key
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        $schema: http://json-schema.org/schema#
        properties:
          reportRefreshDate:
            type: string
          userPrincipalName:
            type:
              - string
              - "null"
          displayName:
            type:
              - string
              - "null"
          isDeleted:
            type:
              - boolean
              - "null"
          lastActivityDate:
            type:
              - string
              - "null"
          sendCount:
            type:
              - number
              - "null"
          receiveCount:
            type:
              - number
              - "null"
          readCount:
            type:
              - number
              - "null"
          meetingCreatedCount:
            type:
              - number
              - "null"
          meetingInteractedCount:
            type:
              - number
              - "null"
          assignedProducts:
            type:
              - array
              - "null"
            items:
              type:
                - string
                - "null"
          reportPeriod:
            type:
              - string
              - "null"
          tenant_id:
            type: string
          source_id:
            type: string
          unique_key:
            type: string
        required:
          - unique_key
          - reportRefreshDate
        additionalProperties: true
    transformations:
      - type: AddFields
        fields:
          - type: AddedFieldDefinition
            path:
              - tenant_id
            value: "{{ config['insight_tenant_id'] }}"
          - type: AddedFieldDefinition
            path:
              - source_id
            value: "{{ config['insight_source_id'] }}"
          - type: AddedFieldDefinition
            path:
              - unique_key
            value: >-
              {{ config['insight_tenant_id'] }}-{{ config['insight_source_id'] }}-{{ record['userPrincipalName'] }}-{{ record['reportRefreshDate']
              }}
    incremental_sync:
      type: DatetimeBasedCursor
      step: P1D
      cursor_field: reportRefreshDate
      end_datetime:
        type: MinMaxDatetime
        datetime: "{{ (today_utc() - duration('P3D')).strftime('%Y-%m-%d') }}"
        datetime_format: "%Y-%m-%d"
      start_datetime:
        type: MinMaxDatetime
        datetime: "{{ (today_utc() - duration('P27D')).strftime('%Y-%m-%d') }}"
        datetime_format: "%Y-%m-%d"
      datetime_format: "%Y-%m-%d"
      lookback_window: P0D
      cursor_granularity: P1D
