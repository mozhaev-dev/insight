version: 2

sources:
  - name: bronze_github
    schema: bronze_github
    tables:
      - name: repositories
      - name: branches
      - name: commits
      - name: file_changes
      - name: pull_requests
      - name: pull_request_reviews
      - name: pull_request_comments
      - name: pull_request_commits

models:
  - name: github__repositories
    description: "GitHub repositories -> staging, feeds class_git_repositories"

  - name: github__repository_branches
    description: "GitHub branches -> staging, feeds class_git_repository_branches"

  - name: github__commits
    description: "GitHub commits -> staging, feeds class_git_commits"

  - name: github__file_changes
    description: "GitHub file changes (PR + direct push) -> staging, feeds class_git_file_changes"

  - name: github__pull_requests
    description: "GitHub pull requests -> staging, feeds class_git_pull_requests"

  - name: github__pull_requests_reviewers
    description: "GitHub PR reviews -> staging, feeds class_git_pull_requests_reviewers"

  - name: github__pull_requests_comments
    description: "GitHub PR comments -> staging, feeds class_git_pull_requests_comments"

  - name: github__pull_requests_commits
    description: "GitHub PR commits -> staging, feeds class_git_pull_requests_commits"
