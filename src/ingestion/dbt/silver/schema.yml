version: 2

models:
  - name: class_comms_events
    description: "Unified communication events from all sources"
    columns:
      - name: tenant_id
        description: "Tenant isolation field"
        tests:
          - not_null
      - name: source_id
        description: "Source instance identifier"
        tests:
          - not_null
      - name: unique_key
        description: "Composite deduplication key"
        tests:
          - not_null
          - unique

  - name: class_crm_users
    description: "Unified CRM users from all sources (Salesforce, HubSpot)"
    columns:
      - name: user_id
        description: "Source-specific user ID"
        tests:
          - not_null
      - name: email
        description: "Email — identity key for Silver Step 2"
        tests:
          - not_null
      - name: data_source
        description: "Source discriminator"
        tests:
          - not_null

  - name: class_crm_deals
    description: "Unified CRM deals/opportunities from all sources"
    columns:
      - name: deal_id
        description: "Source-specific deal ID"
        tests:
          - not_null
      - name: owner_id
        description: "Salesperson ID — joins to class_crm_users.user_id"
        tests:
          - not_null
      - name: data_source
        description: "Source discriminator"
        tests:
          - not_null

  - name: class_crm_activities
    description: "Unified CRM activities (calls, meetings, tasks, emails) from all sources"
    columns:
      - name: activity_id
        description: "Source-specific activity ID"
        tests:
          - not_null
      - name: activity_type
        description: "Normalised type: call, email, task, event, meeting"
        tests:
          - not_null
      - name: owner_id
        description: "Activity owner — joins to class_crm_users.user_id"
        tests:
          - not_null
      - name: data_source
        description: "Source discriminator"
        tests:
          - not_null

  - name: class_crm_contacts
    description: "Unified CRM contacts (external customers) from all sources"
    columns:
      - name: contact_id
        description: "Source-specific contact ID"
        tests:
          - not_null
      - name: data_source
        description: "Source discriminator"
        tests:
          - not_null

  - name: class_crm_accounts
    description: "Unified CRM accounts/companies from all sources"
    columns:
      - name: account_id
        description: "Source-specific account ID"
        tests:
          - not_null
      - name: data_source
        description: "Source discriminator"
        tests:
          - not_null

  - name: class_focus_metrics
    description: >
      Daily pre-aggregation of focus_time_pct and dev_time_h per active employee.
      Joins class_comms_events (Zoom meeting participations) with class_hr_working_hours.
      One row per person per working day. Incremental — appends new days only.
    columns:
      - name: insight_tenant_id
        description: "Tenant isolation field"
        tests:
          - not_null
      - name: source_id
        description: "Source instance identifier"
        tests:
          - not_null
      - name: unique_key
        description: "tenant_id-email-day"
        tests:
          - not_null
          - unique
      - name: email
        description: "Employee work email (lowercased)"
        tests:
          - not_null
      - name: day
        description: "Calendar date of the activity"
        tests:
          - not_null
      - name: meetings_count
        description: "Number of Zoom meeting participation events on this day"
        tests:
          - not_null
      - name: meeting_hours
        description: "Total hours spent in meetings (sum of duration_seconds / 3600)"
        tests:
          - not_null
      - name: working_hours_per_day
        description: "Scheduled working hours from class_hr_working_hours"
        tests:
          - not_null
      - name: focus_time_pct
        description: "100 - (meeting_hours / working_hours_per_day) * 100, capped [0, 100]"
        tests:
          - not_null
      - name: dev_time_h
        description: "working_hours_per_day - meeting_hours, capped at 0 minimum"
        tests:
          - not_null

  - name: class_hr_events
    description: "Unified HR events (leave, on-leave, etc.) from all HR sources"
    columns:
      - name: insight_tenant_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
      - name: source_person_id
        description: "Source-specific employee ID"
        tests:
          - not_null
      - name: event_type
        description: "Normalised event type: leave"
        tests:
          - not_null
      - name: start_date
        tests:
          - not_null
      - name: end_date
        tests:
          - not_null
      - name: source
        tests:
          - not_null

  - name: class_hr_working_hours
    description: "Scheduled working hours per active employee from all HR sources"
    columns:
      - name: insight_tenant_id
        tests:
          - not_null
      - name: source_person_id
        description: "Source-specific employee ID"
        tests:
          - not_null
      - name: email
        description: "Work email — identity key for Gold layer joins"
        tests:
          - not_null
      - name: source
        description: "Source discriminator (bamboohr, workday, …)"
        tests:
          - not_null
      - name: working_hours_per_day
        description: "Scheduled working hours per working day"
        tests:
          - not_null
      - name: working_hours_per_week
        description: "Scheduled working hours per week"
        tests:
          - not_null

  - name: class_people
    description: "Unified person registry from all HR sources (BambooHR, Workday)"
    columns:
      - name: source_person_id
        description: "Source-specific employee ID"
        tests:
          - not_null
      - name: source
        description: "Source discriminator"
        tests:
          - not_null
      - name: workspace_id
        description: "Tenant identifier"
        tests:
          - not_null

  - name: class_git_repositories
    description: "Unified git repositories from all sources (GitHub, Bitbucket, GitLab)"
    columns:
      - name: tenant_id
        description: "Tenant isolation field"
        tests:
          - not_null
      - name: unique_key
        description: "Composite deduplication key"
        tests:
          - not_null
          - unique

  - name: class_git_repository_branches
    description: "Unified git repository branches from all sources (GitHub, Bitbucket, GitLab)"
    columns:
      - name: tenant_id
        description: "Tenant isolation field"
        tests:
          - not_null
      - name: unique_key
        description: "Composite deduplication key"
        tests:
          - not_null
          - unique

  - name: class_git_commits
    description: "Unified git commits from all sources (GitHub, Bitbucket, GitLab)"
    columns:
      - name: tenant_id
        description: "Tenant isolation field"
        tests:
          - not_null
      - name: unique_key
        description: "Composite deduplication key"
        tests:
          - not_null
          - unique

  - name: class_git_file_changes
    description: "Unified git file changes from all sources (GitHub, Bitbucket, GitLab)"
    columns:
      - name: tenant_id
        description: "Tenant isolation field"
        tests:
          - not_null
      - name: unique_key
        description: "Composite deduplication key"
        tests:
          - not_null
          - unique

  - name: class_git_pull_requests
    description: "Unified git pull requests from all sources (GitHub, Bitbucket, GitLab)"
    columns:
      - name: tenant_id
        description: "Tenant isolation field"
        tests:
          - not_null
      - name: unique_key
        description: "Composite deduplication key"
        tests:
          - not_null
          - unique

  - name: class_git_pull_requests_reviewers
    description: "Unified git pull request reviewers from all sources (GitHub, Bitbucket, GitLab)"
    columns:
      - name: tenant_id
        description: "Tenant isolation field"
        tests:
          - not_null
      - name: unique_key
        description: "Composite deduplication key"
        tests:
          - not_null
          - unique

  - name: class_git_pull_requests_comments
    description: "Unified git pull request comments from all sources (GitHub, Bitbucket, GitLab)"
    columns:
      - name: tenant_id
        description: "Tenant isolation field"
        tests:
          - not_null
      - name: unique_key
        description: "Composite deduplication key"
        tests:
          - not_null
          - unique

  - name: class_git_pull_requests_commits
    description: "Unified git pull request commits from all sources (GitHub, Bitbucket, GitLab)"
    columns:
      - name: tenant_id
        description: "Tenant isolation field"
        tests:
