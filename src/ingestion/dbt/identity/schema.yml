version: 2

# Sources used by the identity seeds below are declared in their respective
# connector schema.yml files:
#   - bronze_cursor        → connectors/ai/cursor/dbt/schema.yml
#   - bronze_claude_admin  → connectors/ai/claude-admin/dbt/schema.yml

models:
  # --- Cursor seed ---

  - name: seed_persons_from_cursor
    description: >
      Phase 1 seed: Cursor members → person.persons table.
      One-time load creating canonical person records from Cursor Bronze data.
      Each cursor member becomes one person with display_name, email, role.
    columns:
      - name: id
        description: "Person UUID (UUIDv7)"
        tests:
          - not_null
          - unique
      - name: insight_tenant_id
        description: "Tenant UUID (derived from Bronze tenant_id via sipHash128)"
        tests:
          - not_null
      - name: display_name
        description: "Person display name from cursor"
        tests:
          - not_null
      - name: email
        description: "Person email from cursor (lowercased, trimmed)"
        tests:
          - not_null
      - name: status
        description: "active or inactive (based on isRemoved)"
        tests:
          - not_null
          - accepted_values:
              values: ['active', 'inactive']

  - name: seed_aliases_from_cursor
    description: >
      Phase 1 seed: Cursor members → identity.aliases table.
      Each cursor member produces up to 3 alias rows: email, platform_id, display_name.
      Joins on email to resolve person_id from seed_persons_from_cursor.
    columns:
      - name: id
        description: "Alias UUID (UUIDv7)"
        tests:
          - not_null
          - unique
      - name: person_id
        description: "FK to person.persons.id"
        tests:
          - not_null
      - name: alias_type
        description: "email, platform_id, or display_name"
        tests:
          - not_null
          - accepted_values:
              values: ['email', 'platform_id', 'display_name']
      - name: alias_value
        description: "Normalized alias value"
        tests:
          - not_null
      - name: alias_field_name
        description: "Fully-qualified Bronze field path"
        tests:
          - not_null
          - accepted_values:
              values:
                - 'bronze_cursor.cursor_members.email'
                - 'bronze_cursor.cursor_members.id'
                - 'bronze_cursor.cursor_members.name'
      - name: source_account_id
        description: "Cursor user ID (source_account_id)"
        tests:
          - not_null

  - name: seed_identity_inputs_from_cursor
    description: >
      Phase 1 seed: Cursor members → identity.identity_inputs table.
      Raw alias observations (no normalization). Each cursor member produces
      up to 3 rows: email, platform_id, display_name.
    columns:
      - name: insight_tenant_id
        description: "Tenant UUID (derived from Bronze tenant_id via sipHash128)"
        tests:
          - not_null
      - name: alias_type
        description: "email, platform_id, or display_name"
        tests:
          - not_null
          - accepted_values:
              values: ['email', 'platform_id', 'display_name']
      - name: alias_value
        description: "Raw alias value (not normalized)"
        tests:
          - not_null
      - name: alias_field_name
        description: "Fully-qualified Bronze field path"
        tests:
          - not_null
          - accepted_values:
              values:
                - 'bronze_cursor.cursor_members.email'
                - 'bronze_cursor.cursor_members.id'
                - 'bronze_cursor.cursor_members.name'
      - name: source_account_id
        description: "Cursor user ID"
        tests:
          - not_null
      - name: operation_type
        description: "Always UPSERT for initial seed"
        tests:
          - not_null
          - accepted_values:
              values: ['UPSERT']

  # --- Claude Admin seed ---

  - name: seed_persons_from_claude_admin
    description: >
      Phase 1 seed: Claude Admin users → person.persons table.
      Idempotent — skips users whose email already exists in persons.
      Deduplicates Bronze by taking latest row per email.
    columns:
      - name: id
        description: "Person UUID (UUIDv7)"
        tests:
          - not_null
          - unique
      - name: insight_tenant_id
        description: "Tenant UUID (derived from Bronze tenant_id via sipHash128)"
        tests:
          - not_null
      - name: display_name
        description: "Person display name from Claude Admin"
        tests:
          - not_null
      - name: email
        description: "Person email (lowercased, trimmed)"
        tests:
          - not_null
      - name: status
        description: "Always 'active' for Claude Admin users"
        tests:
          - not_null
          - accepted_values:
              values: ['active']

  - name: seed_aliases_from_claude_admin
    description: >
      Phase 1 seed: Claude Admin users → identity.aliases table.
      Each user produces up to 3 alias rows: email, platform_id, display_name.
      Joins on email to resolve person_id from persons table.
      Idempotent — skips aliases that already exist.
    columns:
      - name: id
        description: "Alias UUID (UUIDv7)"
        tests:
          - not_null
          - unique
      - name: person_id
        description: "FK to person.persons.id"
        tests:
          - not_null
      - name: alias_type
        description: "email, platform_id, or display_name"
        tests:
          - not_null
          - accepted_values:
              values: ['email', 'platform_id', 'display_name']
      - name: alias_value
        description: "Normalized alias value"
        tests:
          - not_null
      - name: alias_field_name
        description: "Fully-qualified Bronze field path"
        tests:
          - not_null
          - accepted_values:
              values:
                - 'bronze_claude_admin.claude_admin_users.email'
                - 'bronze_claude_admin.claude_admin_users.id'
                - 'bronze_claude_admin.claude_admin_users.name'
      - name: source_account_id
        description: "Claude Admin user ID (source_account_id)"
        tests:
          - not_null

  - name: seed_identity_inputs_from_claude_admin
    description: >
      Phase 1 seed: Claude Admin users → identity.identity_inputs table.
      Raw alias observations (no normalization). Each user produces
      up to 3 rows: email, platform_id, display_name.
      Deduplicates Bronze by taking latest row per email.
    columns:
      - name: insight_tenant_id
        description: "Tenant UUID (derived from Bronze tenant_id via sipHash128)"
        tests:
          - not_null
      - name: alias_type
        description: "email, platform_id, or display_name"
        tests:
          - not_null
          - accepted_values:
              values: ['email', 'platform_id', 'display_name']
      - name: alias_value
        description: "Raw alias value (not normalized)"
        tests:
          - not_null
      - name: alias_field_name
        description: "Fully-qualified Bronze field path"
        tests:
          - not_null
          - accepted_values:
              values:
                - 'bronze_claude_admin.claude_admin_users.email'
                - 'bronze_claude_admin.claude_admin_users.id'
                - 'bronze_claude_admin.claude_admin_users.name'
      - name: source_account_id
        description: "Claude Admin user ID"
        tests:
          - not_null
      - name: operation_type
        description: "Always UPSERT for initial seed"
        tests:
          - not_null
          - accepted_values:
              values: ['UPSERT']
