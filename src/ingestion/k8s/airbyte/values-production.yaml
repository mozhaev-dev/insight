# Airbyte Helm values — production K8s cluster
# Adjust resources, storage for your environment

connectorBuilderServer:
  enabled: true

server:
  resources:
    requests:
      memory: 1Gi
      cpu: 500m

worker:
  resources:
    requests:
      memory: 2Gi
      cpu: 1000m

postgresql:
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
  persistence:
    size: 50Gi
    # storageClassName: gp3  # Uncomment and set for your cloud provider

global:
  auth:
    enabled: true
