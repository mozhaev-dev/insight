# Helm values for argo/argo-workflows chart — production
# Adjust resources and auth for your environment

server:
  extraArgs:
    - "--auth-mode=client"    # Bearer token auth; get token via: kubectl create token argo-admin -n argo
  serviceType: ClusterIP
  resources:
    requests:
      memory: 256Mi
      cpu: 200m

controller:
  workflowNamespaces:
    - argo
  resources:
    requests:
      memory: 256Mi
      cpu: 200m

workflow:
  serviceAccount:
    create: true
    name: argo-workflow

executor:
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
