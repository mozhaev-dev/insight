replicaCount: 1

podAnnotations: {}

image:
  repository: ghcr.io/cyberfabric/insight-analytics-api
  tag: ""                  # MUST be set by the operator. No `:latest` default.
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Pre-provisioned Secret with the full analytics-api configuration:
#   ANALYTICS__database_url, ANALYTICS__clickhouse_*, ANALYTICS__redis_url,
#   ANALYTICS__identity_resolution_url, ANALYTICS__bind_addr.
# The umbrella populates `insight-analytics-api-config` automatically; for
# standalone installs the operator pre-creates an equivalent Secret and
# sets `existingSecret` to its name.
existingSecret: ""

# Health probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
