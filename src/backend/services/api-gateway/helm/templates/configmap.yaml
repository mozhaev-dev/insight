apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "insight-api-gateway.fullname" . }}-config
  labels:
    {{- include "insight-api-gateway.labels" . | nindent 4 }}
data:
  gateway.yaml: |
    server:
      home_dir: "/app/data"

    logging:
      default:
        console_level: info

    modules:
      api-gateway:
        config:
          bind_addr: "0.0.0.0:{{ .Values.service.port }}"
          auth_disabled: {{ .Values.authDisabled }}
          cors_enabled: {{ .Values.gateway.corsEnabled }}
          prefix_path: {{ .Values.gateway.prefixPath | quote }}
          enable_docs: {{ .Values.gateway.enableDocs }}
          openapi:
            title: "Insight API"
            version: "0.1.0"
            description: "Insight Platform API"
          defaults:
            body_limit_bytes: 16777216
            rate_limit:
              rps: {{ .Values.gateway.rateLimit.rps }}
              burst: {{ .Values.gateway.rateLimit.burst }}
              in_flight: {{ .Values.gateway.rateLimit.inFlight }}

      module-orchestrator:
        config: {}

      grpc-hub:
        config:
          listen_addr: "uds:///tmp/insight-grpc"

      authn-resolver:
        config:
          vendor: "hyperspot"

      oidc-authn-plugin:
        config:
          vendor: "hyperspot"
          priority: 50
          {{- if .Values.authDisabled }}
          # Auth disabled (LOCAL DEV ONLY): the oidc-authn-plugin still
          # parses its config schema, so we pass a syntactically valid
          # but never-fetched issuer URL and a sentinel audience. The
          # plugin short-circuits before issuing any HTTP request when
          # auth_disabled=true, so the example.com hostname is never
          # actually resolved or contacted.
          issuer_url: "https://disabled.example.com"
          audience: "disabled"
          {{- else if not .Values.oidc.existingSecret }}
          # No existingSecret → operator MUST supply inline values.
          issuer_url: {{ required "oidc.issuer is required when authDisabled=false and oidc.existingSecret is not set" .Values.oidc.issuer | quote }}
          audience:   {{ required "oidc.audience is required when authDisabled=false and oidc.existingSecret is not set" .Values.oidc.audience | quote }}
          {{- end }}
          # When existingSecret is set, OIDC env vars come from envFrom
          # at pod-spec level (see deployment.yaml) — no inline values here.
          jwks_refresh_interval_seconds: 300
          tenant_claim: "tenant_id"
          subject_type: "user"
          leeway_seconds: 60

      auth-info:
        config:
          {{- if .Values.authDisabled }}
          # Auth disabled (LOCAL DEV ONLY) — see issuer comment above.
          issuer_url: ""
          client_id: ""
          redirect_uri: ""
          {{- else if not .Values.oidc.existingSecret }}
          issuer_url:   {{ required "oidc.issuer is required when authDisabled=false and oidc.existingSecret is not set"      .Values.oidc.issuer      | quote }}
          client_id:    {{ required "oidc.clientId is required when authDisabled=false and oidc.existingSecret is not set"    .Values.oidc.clientId    | quote }}
          redirect_uri: {{ required "oidc.redirectUri is required when authDisabled=false and oidc.existingSecret is not set" .Values.oidc.redirectUri | quote }}
          {{- end }}
          scopes: [openid, profile, email]

      authz-resolver:
        config:
          vendor: "hyperspot"

      static-authz-plugin:
        config:
          vendor: "hyperspot"
          priority: 100

      tenant-resolver:
        config:
          vendor: "hyperspot"

      single-tenant-tr-plugin:
        config:
          vendor: "hyperspot"
          priority: 20
          tenants:
            - id: "00000000-df51-5b42-9538-d2b56b7ee953"
              name: "default"
              parent_id: null
              status: active

      proxy:
        config:
          routes:
            {{- /* `tpl` evaluates the upstream string as a Helm template so the
                   umbrella can ship release-name-derived URLs (e.g. `http://{{ "{{" }} .Release.Name {{ "}}" }}-…`)
                   without hardcoding `insight-` prefixes. Literal URLs pass
                   through unchanged. We capture the parent context as $ctx
                   because `range` rebinds `$` for each item. */ -}}
            {{- $ctx := . }}
            {{- range .Values.proxy.routes }}
            - prefix: {{ .prefix | quote }}
              upstream: {{ tpl .upstream $ctx | quote }}
              public: {{ .public | default false }}
            {{- end }}
