replicaCount: 1

podAnnotations: {}

image:
  repository: ghcr.io/cyberfabric/insight-api-gateway
  tag: ""                # MUST be set by the operator. No `:latest` default.
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: ""              # Leave empty for local (no host-based routing)
  tls:
    enabled: false
    secretName: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# OIDC configuration (required for production)
#
# Two modes:
#   1. Pre-provisioned Secret (recommended): set oidc.existingSecret to the
#      name of a K8s Secret containing all OIDC env vars (see secrets/oidc.yaml.example).
#      Values below are ignored.
#   2. Inline values: set oidc.issuer / clientId / redirectUri / audience directly.
#      The chart will create its own Secret from these values. Suitable for local dev.
oidc:
  existingSecret: ""      # Name of pre-provisioned Secret. When set, inline values below are ignored.
  issuer: ""              # e.g., https://dev-12345.okta.com/oauth2/default
  audience: ""            # e.g., api://insight
  clientId: ""            # Frontend (public) OIDC client ID
  redirectUri: ""         # e.g., https://insight.example.com/callback
  # jwksUrl: ""           # Override if JWKS URL differs from {issuer}/v1/keys

# Set to true to disable authentication (local development only)
authDisabled: false

# API Gateway settings
gateway:
  prefixPath: "/api"
  corsEnabled: true
  enableDocs: false     # Set true for dev; disabled by default for production
  rateLimit:
    rps: 100
    burst: 50
    inFlight: 32

# Reverse proxy routes. `upstream` is a templated string — `tpl` is
# applied at chart-render time, so `{{ .Release.Name }}` resolves to
# the actual umbrella release name. Operator can also pass a literal
# URL to point at an external service.
proxy:
  routes: []

# Health probes
# Provided by cyberfabric api-gateway module:
#   GET /health  → {"status":"healthy","timestamp":"..."} (public, no auth)
#   GET /healthz → "ok" (public, no auth)
# No separate /ready endpoint — gateway is stateless, healthy = ready.
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
