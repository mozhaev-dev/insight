replicaCount: 1

podAnnotations: {}

image:
  repository: ghcr.io/cyberfabric/insight-identity
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8082

resources:
  requests:
    cpu: 50m
    memory: 96Mi
  limits:
    cpu: 250m
    memory: 384Mi

# Pre-provisioned Secret with the full identity config:
#   IDENTITY__mariadb__url, IDENTITY__identity__tenant_default_id (optional).
# The umbrella populates `insight-identity-config` automatically
# when `identity.deploy=true`; for standalone installs the operator
# pre-creates an equivalent Secret.
existingSecret: ""

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
