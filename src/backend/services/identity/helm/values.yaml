replicaCount: 1

podAnnotations: {}

image:
  repository: ghcr.io/cyberfabric/insight-identity-resolution
  tag: ""                # MUST be set by the operator. No `:latest` default.
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8082

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Pre-provisioned Secret with the full identity-resolution config:
#   IDENTITY__clickhouse_url, IDENTITY__clickhouse_database,
#   IDENTITY__clickhouse_user, IDENTITY__clickhouse_password.
# (Plus IDENTITY__database_url once PR #214 lands — see DESIGN.)
# The umbrella populates `insight-identity-resolution-config` automatically
# when `identityResolution.deploy=true`; for standalone installs the
# operator pre-creates an equivalent Secret.
existingSecret: ""

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
