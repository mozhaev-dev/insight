# Non-secret defaults. Everything that depends on the deployment (DB
# credentials, tenant pinning) lives in env vars — mirrors the
# IDENTITY__* convention from the retired Rust stub:
#
#   • In cluster: `insight-identity-config` Kubernetes Secret mounted
#     via `envFrom.secretRef` in the Helm chart.
#   • Local F5: `Properties/launchSettings.json`.
#   • Local CLI: env vars from `.env.local` (template at
#     `src/backend/services/identity/.env.local.example`) or
#     `dotnet user-secrets set 'mariadb:url' '...'`.
#
# MariaDB pool/timeout knobs are intentionally absent — zero/unset = use
# MySqlConnector defaults (ConnectionTimeout=15s, CommandTimeout=30s).
# Forcing CommandTimeout below ~30s suffocates the post-handshake
# `SET NAMES` round-trip and surfaces as `Connect Timeout expired`.
identity:
  bind_addr: "0.0.0.0:8082"
  expand_subordinates: false
  max_subordinate_depth: 5

Serilog:
  MinimumLevel:
    Default: Information
    Override:
      Microsoft.AspNetCore: Warning
      Microsoft.Hosting.Lifetime: Information
